  "Thursday 4/30": [
    {"day":"Thursday 4/30","time":"7:00 AM","room":"Grand Foyer","type":"event","Title":"Breakfast","SessionLength":"60m"},
    {"day":"Thursday 4/30","time":"8:00 AM","room":"Junior Ballroom","type":"session","Track":"AI/ML","Title":"How AI is Helping Software to Eat the Worlds of Mechanical and Electrical Engineering","Authors":"Stephen Zielinski","Abstract":"- This roundtable explores how systems engineering principles—including systems thinking, process integration, human-centered design, and performance optimization—can be applied to bridge gaps between clinicians, technologists, and operational leaders.\n- By leveraging tools such as workflow mapping, system modeling, predictive analytics, and feedback loops, healthcare teams can identify failure points, reduce variation, and improve coordination across settings including primary care, specialty care, behavioral health, and population health programs.\n- Emphasis is placed on translating complex care pathways into integrated, scalable models that support real-time decision-making, interoperability, and longitudinal patient management.\n- This discussion highlights how integrated system design can reduce fragmentation, enhance patient and provider experience, and lower avoidable utilization and costs.\n- Participants—including systems engineers, nurses, physicians, IT professionals, and healthcare leaders—will examine real-world challenges in cross-functional collaboration and co-develop practical strategies to align governance, data infrastructure, and care processes within value-based and population health environments.","Affiliation":"Clairio","SessionLength":"30m","isMedtronic":false,"session_id":93,"uid":"s_93"},
    {"day":"Thursday 4/30","time":"8:00 AM","room":"Salon A","type":"session","Track":"Cybersecurity","Title":"Why Threat Modeling Fails in Medical Devices and How Systems Engineers Can Fix It","Authors":"Vince Nguyen","Abstract":"Medical Device Manufacturers are doing more threat modeling\nthan ever before, yet the result of this activity often\nstill fails to identify meaningful design weaknesses and\nprovide actionable guidance to engineering teams on how to\nbuild security into their medical devices. In this talk,\nthe presenter will use his years of first-hand experience\nas a professional medical device threat modeler, both as an\nengineer at a medical device manufacturer and as a\nconsultant, to highlight the reasons why threat modeling\nfails. Some areas of failure that will be explored include\nlimited visibility into off-the-shelf components purchased\nfrom suppliers, not performing the analysis at a deep\nenough level, lack of cross-functional communication and\ncollaboration, and arbitrarily marking areas as\nout-of-scope. After discussing each of these issues, the\npresenter will provide actionable guidance to attendees on\nhow they can avoid these mistakes and maximize the value of\nthreat modeling in their organization.","Affiliation":"MedSec","SessionLength":"60m","isMedtronic":false,"session_id":14,"uid":"s_14"},
    {"day":"Thursday 4/30","time":"8:00 AM","room":"Salon B","type":"session","Track":"Beyond the System","Title":"From Mission to Medical: Applying Defense Digital Strategies to Medical Ecosystems","Authors":"Eli Wilson and Suresh Narayanan","Abstract":"Healthcare systems have hit a complexity ceiling where paper-based engineering no longer ensures market access. Transitioning to digital is risky; Defense spent a decade learning that maturity requires more than hype—it demands synchronized methods, integrated tools, and cultural change.\n\nThis session provides a roadmap to skip these mistakes. We equip attendees with architectural patterns and inquiries to lead a digital transformation, focusing on these strategies:\n\n- Automate Regulatory Evidence: Structure the design history file (DHF) as a natural engineering byproduct rather than a manual burden.\n- Maintain Technical Flexibility: Apply modular design principles to ensure long-term interoperability and avoid total system redesigns.\n- Enrich Multidisciplinary Models: Integrate safety, cybersecurity, and reliability analyses directly into the system model to serve all data consumers.\n- Optimize the Care Continuum: Apply a system-of-systems lens for enterprise trade studies evaluating device impact on patient and hospital operations.\n- Learn the hallmarks of a simulation-ready organization and discover how to navigate the shift toward a mature, patient-centric digital future.","Affiliation":"STC, an Arcfield Company & SEaMSer Consulting, LLC","SessionLength":"60m","isMedtronic":false,"session_id":5,"uid":"s_5"},
    {"day":"Thursday 4/30","time":"8:00 AM","room":"Salon C","type":"session","Track":"Healthcare Delivery","Title":"Modeling the Healthcare Ecosystem: A Traceable, Multi-Layer Digital Architecture Using the Unified Architecture Framework (UAF)","Authors":"Ola Batarseh, Kavitha Chandra and Emi Aoki","Abstract":"Healthcare delivery environments are complex, multi-stakeholder ecosystems characterized by fragmented information flows, heterogeneous systems, evolving regulatory constraints, and growing demands for transparency, quality, and sustainability. This paper presents a model-based systems engineering (MBSE) approach, grounded in the Unified Architecture Framework (UAF), to structure and analyze the healthcare enterprise as an integrated, traceable digital architecture.\n\nThe work introduces a reference healthcare ecosystem architecture capturing key elements including stakeholders, operational activities, clinical and enterprise capabilities, enabling services and systems, data exchanges, and regulatory drivers. Stakeholder needs are translated into architectural viewpoints spanning strategic, operational, services, resources, and standards domains. The resulting UAF model enables end-to-end traceability from stakeholder needs to capabilities, operational processes, services, systems, and compliance requirements.\n\nUsing this integrated architecture, the presentation shows how UAF supports digital-thread visibility across clinical and administrative workflows, enables impact and dependency analysis for capability gaps and modernization decisions, and facilitates evaluation of risks and trade-offs. This work demonstrates how MBSE and UAF improve decision-making and alignment across healthcare stakeholders.","Affiliation":"University of Massachusetts Lowell","SessionLength":"60m","isMedtronic":false,"session_id":22,"uid":"s_22"},
    {"day":"Thursday 4/30","time":"8:00 AM","room":"Salon D","type":"session","Track":"Reqs, Test & Risk","Title":"What is Really Stopping You From Adopting Requirements Management Tools?","Authors":"Michael Casper and Patrick Maxwell","Abstract":"Requirements management tools can significantly improve product development outcomes and support effective Design History File (DHF) management—yet many teams still hesitate to adopt them. This session will share practical lessons learned from transitioning from spreadsheet-based requirements tracking to a structured, scalable requirements management environment. Drawing on real-world experience, the session will explore common barriers to adoption, including organizational readiness, perceived complexity, and concerns about scalability for smaller teams. Attendees will gain insight into how teams can begin using requirements management tools in a pragmatic way—leveraging immediate benefits while establishing a foundation that supports future growth in systems engineering maturity. This presentation is particularly relevant for small to mid-sized teams seeking to strengthen their requirements practices without overengineering their processes, offering actionable guidance on how to align tools, workflows, and team capabilities as systems engineering needs evolve.","Affiliation":"Smith & Nephew & Cognition Corp","SessionLength":"30m","isMedtronic":false,"session_id":26,"uid":"s_26"},
    {"day":"Thursday 4/30","time":"8:30 AM","room":"Junior Ballroom","type":"session","Track":"AI/ML","Title":"System Engineering and AI Driven: UserVoices to Solutions Design Process","Authors":"Rajat Gupta, John Mehawej, Sharon Wright and Jeffrey Zweber","Abstract":"- The integration of Systems Engineering principles with Artificial Intelligence (AI) is redefining design methodologies by bridging user needs and business objectives.\n- This study explores the “User Voice” to “Epic” to “Feature” design process, where Systems Engineering techniques capture user voices, group them into personas, and align them with overarching business requirements.\n- Once aligned, Epics and features are extensively defined and prioritized by stakeholders to ensure alignment with strategic goals.\n- An AI-driven approach is utilized to dissect user stories, evaluate their quality based on predefined scoring rules, and ensure they adhere to standards of clarity, completeness, and feasibility.\n- By automating the analysis and scoring process, AI enhances accuracy, reduces manual effort, and accelerates decision-making.\n- This structured methodology facilitates the seamless transition from user inputs to actionable Epic’s and features, fostering efficiency and collaboration.\n- The study highlights the synergy between Systems Engineering and AI, presenting a robust framework for delivering user-centered, business-aligned solutions.","Affiliation":"Medtronic Inc","SessionLength":"60m","isMedtronic":true,"session_id":27,"uid":"s_27"},
    {"day":"Thursday 4/30","time":"8:30 AM","room":"Salon D","type":"session","Track":"Reqs, Test & Risk","Title":"Using a Requirements Management tool for Defect Management","Authors":"Christopher Unger","Abstract":"GEHC is moving to a new requirements and test management\ntool after 25 years using DOORS.  We are moving most of our\nSE \"document\" processes into the new tool.  One of those\nfunctions is Issue and Defect management.  We have a\ndedicated tool for defects (our third iteration) and there\nis concern whether a \"requirements tool\" can support all\nour functions.  This presentation describes how we use\nsystems engineering to identify and retire the key risks.","Affiliation":"Practical SE, LLC and GE Healthcare","SessionLength":"30m","isMedtronic":false,"session_id":46,"uid":"s_46"},
    {"day":"Thursday 4/30","time":"9:00 AM","room":"Salon A","type":"session","Track":"Cybersecurity","Title":"Security Risk Estimation in Medical Device Systems Engineering: A Comparative Analysis of Ten Assessment Methodologies","Authors":"Matthew Vorhees and Michelle Jump","Abstract":"- This presentation shares my evolving journey coordinating decoupled engineering teams, each with unique styles, timelines, and quality systems.\n- At first, I adopted a top-down strategy inspired by Copernicus’s solar system model—where one central vision guided all teams, orbiting around a common documentation process.\n- This approach emphasized unified oversight and consistency but struggled to accommodate the diverse realities of each team.\n- Transitioning to a more decentralized framework, I drew from Ptolemy’s model: instead of one central vision, each team was allowed its own unique viewpoint—much like individual observers interpreting the night sky.\n- Coordination became limited, allowing teams to operate as they saw fit, contributing to the collective vision only as needed.\n- This shift fostered greater autonomy and adaptability, but it revealed that success now relied heavily on each team's diligence and responsibility.\n- To ensure alignment, I am now invoking the trust-but-verify principle and Star Trek’s Borg collective concept—recognizing that, while teams can act independently, updating and maintaining the collective consciousness requires both trust in their contributions and mechanisms for verification.\n- The presentation distills practical lessons in balancing autonomy with unity, inviting systems engineers to reconsider how classic models of coordination can shape modern engineering development processes.","Affiliation":"Medtronic & MedSec","SessionLength":"30m","isMedtronic":true,"session_id":48,"uid":"s_48"},
    {"day":"Thursday 4/30","time":"9:00 AM","room":"Salon B","type":"session","Track":"Beyond the System","Title":"Executable by Design: Computational Thinking for Speed and Scale in Systems Engineering","Authors":"Joshua Zehoski and Joseph Green","Abstract":"Systems engineering has long valued rigor in thinking, yet much of that rigor remains locked in static documents and manual processes punctuated by disjointed tools. Computational thinking - decomposing problems, formalizing intent, and structuring information for execution - creates a bridge from data and hypotheses to insight and action.\n\nApplying a computational thinking mindset coupled with the growing capabilities of Generative AI, MBSE, and Continuous Integration enables systems engineers to rapidly move from intent to SE task execution across the system development lifecycle.\n\nThis presentation will explore: how Generative AI acts as a force multiplier for turning computational thinking into executable code that shifts effort from document production to insight generation; the virtuous cycle of Model-Based Systems Engineering acting as both a driver and beneficiary of better structuring data for computation; and the skills and capabilities individuals and systems engineering organizations need to take advantage of this shift.\n\nThe result is systems engineering that is executable by design—faster, more scalable, and better aligned with the complexity of modern healthcare systems.","Affiliation":"Medtronic","SessionLength":"30m","isMedtronic":true,"session_id":42,"uid":"s_42"},
    {"day":"Thursday 4/30","time":"9:00 AM","room":"Salon C","type":"session","Track":"Healthcare Delivery","Title":"Integrating Systems Engineering into Value-Based Care and Population Health Payment and Healthcare Delivery Models","Authors":"Sharon Hartzel","Abstract":"- Integrating systems engineering into value-based and population health models offers a structured approach to managing complexity, improving outcomes, and controlling costs in healthcare delivery.\n- By applying principles such as systems thinking, process design, and performance optimization, risk-bearing entities can better coordinate care and manage ongoing, long-term patient needs.\n- This approach enables the intentional design of chronic disease care pathways, reduces unwarranted variation in clinical outcomes and spending, and strengthens population health workflows including attribution, stratification, and care gap management.\n- Additionally, well-defined system architectures and feedback loops support continuous quality improvement, data-driven decision-making, and scalable operations aligned with evolving reimbursement and accountability frameworks.\n- Ultimately, this integration enhances value-based care performance by improving quality metrics, lowering total cost of care, and supporting more predictable financial and clinical outcomes.","Affiliation":"NSI Advisory Services","SessionLength":"90m","isMedtronic":false,"session_id":66,"uid":"s_66"},
    {"day":"Thursday 4/30","time":"9:00 AM","room":"Salon D","type":"session","Track":"Reqs, Test & Risk","Title":"Rethinking Accuracy Evaluation in Surgical Robotics: A Systems-Engineering Framework for Verification Without Post-Operative Image Dependence","Authors":"Casey McBride","Abstract":"- Postoperative CT imaging is commonly used to evaluate accuracy in image dependent orthopedic robotic systems, but it carries significant drawbacks, including high cost, long processing times, metal artifacts, and limited ability to identify the sources of accuracy errors.\n- These constraints hinder requirements decomposition, complicate verification planning, and reduce traceability across tracking, registration, and execution subsystems.\n- Here we present a model based requirements and test architecture that separates accuracy into independent registration and execution domains, each verified through targeted test methods.\n- Representative requirement categories—such as registration transformation error, point to surface accuracy, implant placement tolerances, and tool tracking limits—illustrate how structured requirements and matching test strategies improve testability and fault isolation while reducing reliance on postoperative imaging.\n- The test architecture leverages benchtop methods and algorithm level verification to decouple subsystem evaluations, increasing diagnostic power and minimizing variability from anatomy or imaging artifacts.\n- This approach enhances traceability, enables earlier defect detection, and strengthens alignment between requirement intent and verification evidence.\n- The resulting framework shows how disciplined requirements decomposition and focused test strategies can improve system assurance in orthopedic robotics while reducing development burden.","Affiliation":"Smith & Nephew","SessionLength":"30m","isMedtronic":false,"session_id":35,"uid":"s_35"},
    {"day":"Thursday 4/30","time":"9:30 AM","room":"Grand Foyer","type":"break","Title":"Break","SessionLength":"30m"},
    {"day":"Thursday 4/30","time":"10:00 AM","room":"Junior Ballroom","type":"session","Track":"AI/ML","Title":"The Systems Engineering Agentic Cookbook","Authors":"Justin Grammens","Abstract":"AI-assisted development has accelerated how software is built, but many teams are finding that speed without structure leads to fragile systems, unclear intent, and loss of architectural discipline. Ad hoc “vibe coding” may work for isolated tasks, but it breaks down when applied to systems that require traceability, verification, and long-term evolution.\n\nThis session presents a practical, systems-first approach to AI-assisted engineering that integrates three complementary practices: specification-first development, product-minded engineering, and disciplined use of AI tools.\n\nDuring this session, attendees will see how a formalized framework, such as SpecKit, establishes clear system intent and constraints, enabling AI tools to operate within well-defined boundaries. The session demonstrates how product-minded engineering connects requirements to outcomes and how AI-assisted engineering accelerates implementation and iteration without compromising system rigor.\n\nRather than replacing systems engineering practices, this approach reinforces them. AI becomes a force multiplier when embedded in structured workflows that preserve architectural integrity, support traceability, and align with the full system lifecycle.\n\nThis talk is intended for systems engineers, technical managers, and architects seeking a repeatable model for integrating AI into modern systems engineering while maintaining control, clarity, and confidence in the systems they deliver.","Affiliation":"Lab651","SessionLength":"60m","isMedtronic":false,"session_id":50,"uid":"s_50"},
    {"day":"Thursday 4/30","time":"10:00 AM","room":"Salon A","type":"session","Track":"Cybersecurity","Title":"Cybersecurity Post-Market Analysis Monitoring System","Authors":"Gerald Rigdon","Abstract":"The Cybersecurity Post-Market Analysis Monitoring System\n(CPAMS) represents a composite approach to cybersecurity\nvulnerability monitoring and research, combining artificial\nintelligence and multi-source data integration to deliver\nthreat intelligence. This paper presents a detailed\nanalysis of the system’s architecture, methodology, and\ncapabilities, with particular emphasis on its application\nto medical device cybersecurity post-market surveillance.\nCPAMS integrates data from the National Vulnerability\nDatabase (NVD) and Tavily web-based search, generates an\nAzure index, and utilizes both Embedding Models and Large\nLanguage Models (LLMs) for vulnerability discovery and\nidentification.","Affiliation":"Boston Scientific","SessionLength":"30m","isMedtronic":false,"session_id":21,"uid":"s_21"},
    {"day":"Thursday 4/30","time":"10:00 AM","room":"Salon B","type":"session","Track":"Beyond the System","Title":"SE Lite for Concept Stage","Authors":"John Vantuno and Jason Sherey","Abstract":"Systems Engineering is commonly avoided in the concept\nstage of product development because it is considered to be\na burdensome activity that will slow down the innovation\neffort.  As a result, the scope of work is ill-defined,\nleading to a “finished” product passed off to the\ndevelopment team to commercialize, even though it doesn’t\nfulfil the real need of the stakeholders.  The ideal\nsituation would be to strike a balance between enough\nsystems engineering to provide guidance, but not so much\nthat the systems engineering work gets in the way.  This\npresentation proposes a “Systems Engineering Lite” process\nthat is the bare minimum necessary to fully define the\nproblem space and design space, without slowing down the\ninnovation effort.\n\nThis process was successfully piloted on a small project. \nThis presentation steps through how the process was\napplied, the benefits of its use, and the lessons learned\nregarding how it could have been applied better.  It then\nlists the things to do and, just as importantly, the things\nnot to do in the concept phase.  It finishes with\nsuggestions for scalability and relationships to the Agile\nprocess.","Affiliation":"Crossroads Chapter","SessionLength":"30m","isMedtronic":false,"session_id":29,"uid":"s_29"},
    {"day":"Thursday 4/30","time":"10:00 AM","room":"Salon D","type":"session","Track":"Other","Title":"Goodbye QSIT: A New Approach to FDA Inspections","Authors":"Paul Wisnewski","Abstract":"FDA has regulatory oversight of medical device companies operating in the United States, a part of which is the authority to conduct inspections. Since 1999, FDA has utilized a method referred to as Quality System Inspection Technique (QSIT) as a framework for most inspections. The QSIT technique focuses on four key process areas: Management Controls, Design Controls, CAPA, and Production and Process Controls.\n\nEffective 2-Feb-2026, the US regulation governing Quality Management Systems was revised, incorporating by reference ISO 13485, the international standard for medical device quality management systems. The change necessitated a rethinking of the historical QSIT method to align to the new regulation. To address this, FDA recently published revised inspection guidelines intended to focus on potential risks to patients and/or users. This presentation will provide an overview of the revised inspection approach, including the increased emphasis on product and process risk.","Affiliation":"Digital Diagnostics","SessionLength":"30m","isMedtronic":false,"session_id":13,"uid":"s_13"},
    {"day":"Thursday 4/30","time":"10:30 AM","room":"Salon A","type":"session","Track":"Cybersecurity","Title":"ASK AN EXPERT: Cybersecurity in Healthcare Systems","Authors":"Michelle Jump","Abstract":"Have lingering questions from the cybersecurity sessions?\nThis open Q&A panel brings together our track speakers to\naddress your questions and discuss real-world challenges in\nsecuring healthcare systems. The discussion will be driven\nby attendee questions, with a focus on practical insights\nand shared experience.","Affiliation":"MedSec","SessionLength":"60m","isMedtronic":false,"session_id":61,"uid":"s_61"},

function getViewportMode() {
    const width = getEffectiveViewportWidth();
    if (width <= MOBILE_BREAKPOINT) return 'mobile';
    if (width <= COMPACT_BREAKPOINT) return 'compact';
    return 'desktop';
}

function getEffectiveViewportWidth() {
    const clientWidth = document.documentElement ? document.documentElement.clientWidth : 0;
    const innerWidth = window.innerWidth;
    return [clientWidth, innerWidth].find(w => Number.isFinite(w) && w > 0) || 0;
}

function isMobileLayoutViewport() {
    return getEffectiveViewportWidth() <= MOBILE_BREAKPOINT;
}

function updateAdaptiveTopbarMode() {
    const bodyEl = document.body;
    if (!bodyEl) return false;

    const headerEl = document.querySelector('header');
    const titleEl = headerEl?.querySelector('h1');
    const headerRightEl = headerEl?.querySelector('.header-right');
    if (!headerEl || !titleEl || !headerRightEl) return false;

    const previousMode = bodyEl.classList.contains('topbar-compact');
    bodyEl.classList.remove('topbar-compact');

    // Compute required width from intrinsic child widths (not flex container scrollWidth),
    // otherwise the header can appear "always compact" on desktop.
    const headerStyle = window.getComputedStyle(headerEl);
    const paddingX = parseFloat(headerStyle.paddingLeft || '0') + parseFloat(headerStyle.paddingRight || '0');
    const gapX = parseFloat(headerStyle.columnGap || headerStyle.gap || '0');
    const rightStyle = window.getComputedStyle(headerRightEl);
    const rightGap = parseFloat(rightStyle.columnGap || rightStyle.gap || '0');
    const controls = Array.from(headerRightEl.children).filter(el => el instanceof HTMLElement && window.getComputedStyle(el).display !== 'none');
    const controlsWidth = controls.reduce((sum, el) => sum + el.getBoundingClientRect().width, 0);
    const controlsGapsWidth = Math.max(0, controls.length - 1) * rightGap;
    const titleWidth = titleEl.getBoundingClientRect().width;
    const requiredWidth = titleWidth + controlsWidth + controlsGapsWidth + paddingX + gapX;
    const availableWidth = headerEl.clientWidth;

    // Also detect actual line break by comparing top positions.
    const titleTop = Math.round(titleEl.getBoundingClientRect().top);
    const controlsTop = Math.round(headerRightEl.getBoundingClientRect().top);
    const hasWrapped = controlsTop > titleTop + 2;
    const shouldCompact = hasWrapped || requiredWidth > (availableWidth - 8);

    bodyEl.classList.toggle('topbar-compact', shouldCompact);
    return previousMode !== shouldCompact;
}

function parseClockMinutes(timeString) {
    if (!timeString) return 0;
    const [timePart, meridiem] = timeString.split(' ');
    const [hourText, minuteText] = timePart.split(':');
    let hour = parseInt(hourText, 10);
    const minutes = parseInt(minuteText, 10);
    const isPm = meridiem === 'PM';
    if (isPm && hour !== 12) hour += 12;
    if (!isPm && hour === 12) hour = 0;
    return hour * 60 + minutes;
}

function sortTimes(times) {
    return [...times].sort((left, right) => parseClockMinutes(left) - parseClockMinutes(right));
}

function parseDurationMinutes(lengthValue) {
    if (typeof lengthValue === 'number' && Number.isFinite(lengthValue)) {
        return lengthValue;
    }
    if (typeof lengthValue !== 'string') return null;
    const hoursMatch = lengthValue.match(/(\d+)\s*h/i);
    const minutesMatch = lengthValue.match(/(\d+)\s*m/i);
    const hours = hoursMatch ? parseInt(hoursMatch[1], 10) : 0;
    const minutes = minutesMatch ? parseInt(minutesMatch[1], 10) : 0;
    const total = (hours * 60) + minutes;
    return total || null;
}

function getDefaultDurationMinutes(dayTimes, session) {
    const sortedTimes = sortTimes(dayTimes);
    const startMinutes = parseClockMinutes(session.time);
    const nextTime = sortedTimes.find(time => parseClockMinutes(time) > startMinutes);
    if (!nextTime) return 30;
    return Math.max(SLOT_MINUTES, parseClockMinutes(nextTime) - startMinutes);
}

function getExplicitDurationMinutes(session) {
    return (
        parseDurationMinutes(session.DurationMinutes) ||
        parseDurationMinutes(session.Duration) ||
        parseDurationMinutes(session.SessionLength)
    );
}

function getSessionDurationMinutes(dayTimes, session) {
    return getExplicitDurationMinutes(session) || getDefaultDurationMinutes(dayTimes, session);
}

function getBreakDisplayTitle(session) {
    const baseTitle = String(session.Title || 'Break').trim() || 'Break';
    const daySessions = data[session.day] || [];
    const dayTimes = daySessions.map(s => s.time);
    const durationMinutes = getExplicitDurationMinutes(session) || getSessionDurationMinutes(dayTimes.length ? dayTimes : [session.time], session);
    return `${durationMinutes}-minute ${baseTitle}`;
}

function isBreakStyleEvent(session) {
    const title = (session.Title || '').toLowerCase();
    return session.type === 'break' || /\bbreakfast\b|\blunch\b|\bbreak\b/.test(title);
}

function isMealStyleEvent(session) {
    const title = (session.Title || '').toLowerCase();
    return /\bbreakfast\b|\blunch\b/.test(title);
}

function isSessionStyleEvent(session) {
    const title = (session.Title || '').toLowerCase();
    const typeLower = (session.type || '').toLowerCase();
    return typeLower === 'keynote' || (typeLower === 'event' && /\bconference kickoff\b/.test(title));
}

function isGlobalOverlayEvent(session) {

function getSlotMetrics(sessions) {
    if (sessions.length === 0) {
        return { dayStart: 0, totalSlots: 1 };
    }
    const dayTimes = sessions.map(s => s.time);
    const starts = sessions.map(s => parseClockMinutes(s.time));
    const ends = sessions.map(s => parseClockMinutes(s.time) + getSessionDurationMinutes(dayTimes, s));
    const dayStart = Math.min(...starts);
    const dayEnd = Math.max(...ends);
    return {
        dayStart,
        totalSlots: Math.max(1, Math.ceil((dayEnd - dayStart) / SLOT_MINUTES))
    };
}

function getGridPlacement(dayTimes, slotMetrics, session) {
    const startMinutes = parseClockMinutes(session.time);
    const durationMinutes = getSessionDurationMinutes(dayTimes, session);
    const startSlot = Math.floor((startMinutes - slotMetrics.dayStart) / SLOT_MINUTES) + 1;
    const slotSpan = Math.max(1, Math.ceil(durationMinutes / SLOT_MINUTES));
    return { startSlot, slotSpan, durationMinutes };
}

function getDayBounds(sessions) {
    if (sessions.length === 0) {
        return { start: 8 * 60, end: (8 * 60) + 60 };
    }

    const dayTimes = sessions.map(s => s.time);
    const starts = sessions.map(s => parseClockMinutes(s.time));
    const ends = sessions.map(s => parseClockMinutes(s.time) + getSessionDurationMinutes(dayTimes, s));

    const minStart = Math.min(...starts);
    const maxEnd = Math.max(...ends);
    const start = Math.floor(minStart / 30) * 30;
    const end = Math.ceil(maxEnd / 30) * 30;
    return { start, end };
}

function minuteToLabel(totalMinutes) {
    const hour24 = Math.floor(totalMinutes / 60) % 24;
    const minute = totalMinutes % 60;
    const suffix = hour24 >= 12 ? 'PM' : 'AM';
    const hour12 = ((hour24 + 11) % 12) + 1;
    return `${hour12}:${String(minute).padStart(2, '0')} ${suffix}`;
}

function getVisibleDisplay(el) {

function escapeHtml(value) {
    return String(value || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
}

function formatTransferStatement(rawText) {
    let formatted = escapeHtml(rawText || '');
    formatted = formatted.replace(
        /\bAt\s+([0-9]{1,2}:[0-9]{2}\s*[ap](?:m)?)\b/gi,
        (match, timeText) => `<strong>At ${timeText}</strong>`
    );
    formatted = formatted.replace(/\bimmediately\b/gi, '<strong>$&</strong>');
    formatted = formatted.replace(/\bto\s+([^<]+)$/i, 'to <strong>$1</strong>');
    return formatted;
}

function buildDetailsHtml(session) {
    const trackColor = getSessionAccentColor(session, session.Track);
    const trackLabel = isKeynoteSession(session) ? 'Keynote' : (session.Track || session.type || 'Session');
    const meta = [];
    const abstractText = String(session.Abstract || '').trim();
    const hasAbstract = abstractText && abstractText.toLowerCase() !== 'nan';
    meta.push(`<div><strong>When:</strong> ${escapeHtml(session.day || currentView)}, ${escapeHtml(session.time || '')}</div>`);
    if (session.room) meta.push(`<div><strong>Room:</strong> ${escapeHtml(session.room)}</div>`);
    if (session.Authors) meta.push(`<div><strong>Authors:</strong> ${escapeHtml(session.Authors)}</div>`);
    if (session.Affiliation) meta.push(`<div><strong>Affiliation:</strong> ${escapeHtml(session.Affiliation)}</div>`);
    if (session.SessionLength) meta.push(`<div><strong>Length:</strong> ${escapeHtml(session.SessionLength)}</div>`);

    return `
        <button class="details-close" type="button" aria-label="Close details">×</button>
        <div class="details-track" style="color: ${trackColor};">${escapeHtml(trackLabel)}</div>
        <div class="details-title">${escapeHtml(session.Title || 'Session details')}</div>
        <div class="details-scroll-wrap">

                <div class="details-meta">${meta.join('')}</div>
                ${hasAbstract ? `<div class="details-abstract">${escapeHtml(abstractText)}</div>` : ''}

}

function syncDetailsScrollState() {
    const scrollEl = detailsPanel.querySelector('.details-scroll');
    if (!scrollEl) {
        detailsPanel.classList.remove('has-scroll-top', 'has-scroll-bottom');
        return;
    }

    const maxScroll = Math.max(0, scrollEl.scrollHeight - scrollEl.clientHeight);
    const atTop = scrollEl.scrollTop <= 2;
    const atBottom = scrollEl.scrollTop >= maxScroll - 2;

    detailsPanel.classList.toggle('has-scroll-top', maxScroll > 0 && !atTop);
    detailsPanel.classList.toggle('has-scroll-bottom', maxScroll > 0 && !atBottom);
}

function closeSessionDetails() {

    detailsPanel.classList.remove('show');
    detailsPanel.setAttribute('aria-hidden', 'true');
    document.body.classList.remove('modal-open');
}

function positionDetailsPanel(anchorEl) {
    const isMobile = isMobileLayoutViewport();
    const maxPanelHeight = isMobile
        ? Math.min(560, Math.floor(window.innerHeight * 0.76))
        : Math.min(640, Math.floor(window.innerHeight * 0.72));
    const contentHeight = Math.ceil(detailsPanel.scrollHeight || 0);
    const needsConstrainedHeight = contentHeight > maxPanelHeight;
    const panelHeight = needsConstrainedHeight ? maxPanelHeight : contentHeight;

    if (isMobile) {
        detailsPanel.style.height = needsConstrainedHeight ? `${panelHeight}px` : 'auto';
        detailsPanel.style.left = '12px';
        detailsPanel.style.right = '12px';
        detailsPanel.style.top = 'auto';
        detailsPanel.style.bottom = '12px';
        return;
    }

    const rect = anchorEl.getBoundingClientRect();
    const panelWidth = Math.min(360, window.innerWidth - 32);
    const gap = 12;

    detailsPanel.style.width = `${panelWidth}px`;
    detailsPanel.style.height = needsConstrainedHeight ? `${panelHeight}px` : 'auto';

    const spaceRight = window.innerWidth - rect.right - gap;
    const spaceLeft = rect.left - gap;
    const placeRight = (spaceRight >= panelWidth) || (spaceRight >= spaceLeft);
    const preferredLeft = placeRight ? (rect.right + gap) : (rect.left - panelWidth - gap);
    const left = Math.max(12, Math.min(preferredLeft, window.innerWidth - panelWidth - 12));

    const preferredTop = rect.top;
    const renderedHeight = needsConstrainedHeight ? panelHeight : Math.ceil(detailsPanel.getBoundingClientRect().height || panelHeight);
    const top = Math.max(12, Math.min(preferredTop, window.innerHeight - renderedHeight - 12));

    detailsPanel.style.left = `${left}px`;
    detailsPanel.style.right = 'auto';
    detailsPanel.style.top = `${top}px`;
    detailsPanel.style.bottom = 'auto';
}

function openSessionDetails(session, anchorEl) {
    activeDetailsUid = session.uid || null;
    activeDetailsAnchor = anchorEl || null;
    detailsPanel.innerHTML = buildDetailsHtml(session);
    detailsPanel.querySelector('.details-close').onclick = closeSessionDetails;
    const scrollEl = detailsPanel.querySelector('.details-scroll');
    if (scrollEl) {
        scrollEl.scrollTop = 0;
        scrollEl.addEventListener('scroll', syncDetailsScrollState, { passive: true });
    }
    positionDetailsPanel(anchorEl);
    detailsBackdrop.classList.add('show');
    detailsPanel.classList.add('show');
    detailsPanel.setAttribute('aria-hidden', 'false');
    document.body.classList.add('modal-open');
    requestAnimationFrame(syncDetailsScrollState);
}

function renderTrackFilters() {
    const container = document.getElementById('trackFilters');
    container.innerHTML = '';
    
    if (currentView === 'starred') {
        container.style.display = 'none';
        return;
    }

    container.style.display = '';

    const isSearchActive = ((document.getElementById('searchBar')?.value || '').trim() !== '');

    const tracks = isSearchActive
        ? Object.values(data).flat().map(s => s.Track).filter(Boolean)
        : getAllTracksForDay(currentView);
    
    const uniqueTracks = [...new Set(tracks)]
        .filter(track => String(track).trim().toLowerCase() !== 'general')
        .sort();
    if (uniqueTracks.length === 0) {
        container.style.display = 'none';
        return;
    }

    const label = document.createElement('span');
    label.className = 'filter-label';
    label.textContent = 'Filter:';
    container.appendChild(label);

    // Medtronic chip — always shown first
    const medChip = document.createElement('button');
    const medActive = activeTrackFilters.has('__medtronic__');
    medChip.className = 'track-chip' + (activeTrackFilters.size === 0 || medActive ? ' active' : ' inactive');
    medChip.style.borderColor = '#007bff';
    if (medActive) medChip.style.background = '#007bff22';
    const medDot = document.createElement('span');
    medDot.className = 'chip-dot';
    medDot.style.background = '#007bff';
    medChip.appendChild(medDot);
    medChip.appendChild(document.createTextNode('Medtronic'));
    medChip.onclick = () => toggleTrackFilter('__medtronic__');
    container.appendChild(medChip);

    uniqueTracks.forEach(track => {
        const chip = document.createElement('button');
        chip.className = 'track-chip' + (activeTrackFilters.size === 0 || activeTrackFilters.has(track) ? ' active' : ' inactive');
        chip.style.borderColor = getTrackColor(track);
        if (activeTrackFilters.has(track)) chip.style.background = getTrackColor(track) + '22';
        
        const dot = document.createElement('span');
        dot.className = 'chip-dot';
        dot.style.background = getTrackColor(track);
        chip.appendChild(dot);
        chip.appendChild(document.createTextNode(track));
        
        chip.onclick = () => toggleTrackFilter(track);
        container.appendChild(chip);
    });

    if (activeTrackFilters.size > 0) {
        const clearBtn = document.createElement('button');
        clearBtn.className = 'track-chip';
        clearBtn.textContent = 'Clear';
        clearBtn.style.borderColor = '#ccc';
        clearBtn.onclick = () => { activeTrackFilters.clear(); renderTrackFilters(); applyFilters(); };
        container.appendChild(clearBtn);
    }
}

function toggleTrackFilter(track) {
    if (activeTrackFilters.has(track)) {
        activeTrackFilters.delete(track);
    } else {
        activeTrackFilters.add(track);
    }
    renderTrackFilters();
    applyFilters();
}

// ─── RENDER SCHEDULE ───
function renderSchedule() {
    searchQuery = (document.getElementById('searchBar')?.value || '').toLowerCase().trim();
    isGlobalSearchMode = currentView !== 'starred' && searchQuery !== '';

    // Keep talk-track chips aligned with current mode (day-only vs all-days search).
    renderTrackFilters();

    const container = document.getElementById('scheduleContainer');
    container.innerHTML = '';
    container.classList.remove('starred-view', 'search-results-view');
    closeSessionDetails();

    if (currentView === 'starred') {
        container.classList.add('starred-view');
        renderStarredView(container);
        applyMobileLayout();
        requestAnimationFrame(updateSessionTitleLayout);
        requestAnimationFrame(updateScrollDateTimeIndicator);
        return;
    }

    if (isGlobalSearchMode) {
        container.classList.add('search-results-view');
        renderGlobalSearchResults(container);
        suppressSearchRerender = true;
        try {
            applyFilters();
        } finally {
            suppressSearchRerender = false;
        }
        applyMobileLayout();
        requestAnimationFrame(updateSessionTitleLayout);
        requestAnimationFrame(updateScrollDateTimeIndicator);
        return;
    }

    if (isMobileLayoutViewport()) {
        renderMobileDayList(currentView, container);
    } else {
        renderDesktopDayGrid(currentView, container);
    }
    suppressSearchRerender = true;
    try {
        applyFilters();
    } finally {
        suppressSearchRerender = false;
    }
    applyMobileLayout();
    requestAnimationFrame(updateSessionTitleLayout);
    requestAnimationFrame(updateScrollDateTimeIndicator);
}

function renderDesktopDayGrid(day, container) {
    const sessions = data[day] || [];
    const rooms = getRoomsForDay(day);
    const colRooms = rooms;
    const gridTemplate = `var(--time-col-width) repeat(${colRooms.length}, var(--desktop-col-width))`;
    const dayTimes = sessions.map(s => s.time);
    const baseSlotMetrics = getSlotMetrics(sessions);
    const dayBounds = getDayBounds(sessions);
    const TIMETABLE_BREAK_MIN_GAP = 90;
    const TIMETABLE_BREAK_VISIBLE_MINUTES = 25;

    // Compress long sparse windows by room coverage (not raw session count).
    // This preserves normal single-track plenary blocks while still compressing
    // edge cases like one-room tutorials with most columns empty.
    const salonSpanCount = colRooms.filter(room => /^Salon [A-D]$/.test(room)).length || 4;
    const roomCoverageThreshold = Math.max(1, Math.floor(colRooms.length * 0.2));
    const occupancyRanges = sessions
        .filter(session => !isBreakStyleEvent(session))
        .map(session => {
            const start = parseClockMinutes(session.time);
            const end = start + getSessionDurationMinutes(dayTimes, session);
            let coverage = 1;
            if (session.room === 'Grand Ballroom - Salons A-D') {
                coverage = salonSpanCount;
            }
            return { start, end, coverage };
        });

    const sessionRanges = sessions.map(session => {
        const start = parseClockMinutes(session.time);
        const end = start + getSessionDurationMinutes(dayTimes, session);
        return { session, start, end };
    });

    const lowDensityRuns = [];
    let runStart = null;
    for (let minute = dayBounds.start; minute < dayBounds.end; minute += SLOT_MINUTES) {
        const slotEnd = minute + SLOT_MINUTES;
        let activeCoverage = 0;
        for (const range of occupancyRanges) {
            if (range.start < slotEnd && range.end > minute) {
                activeCoverage += range.coverage;
                if (activeCoverage > roomCoverageThreshold) break;
            }
        }

        const isLowDensity = activeCoverage <= roomCoverageThreshold;
        if (isLowDensity) {
            if (runStart === null) runStart = minute;
        } else if (runStart !== null) {
            lowDensityRuns.push({ start: runStart, end: minute });
            runStart = null;
        }
    }
    if (runStart !== null) {
        lowDensityRuns.push({ start: runStart, end: dayBounds.end });
    }

    // Never compress across explicit event boundaries. This preserves a readable
    // timeline line at key transitions (for example, Happy Hour ending at 7:00 PM).
    const transitionBoundaries = [...new Set(
        sessionRanges.flatMap(range => [range.start, range.end])
    )]
        .filter(minute => Number.isFinite(minute))
        .sort((a, b) => a - b);

    const splittableLowDensityRuns = [];
    lowDensityRuns.forEach(run => {
        const splitPoints = [
            run.start,
            ...transitionBoundaries.filter(minute => minute > run.start && minute < run.end),
            run.end
        ];

        for (let i = 0; i < splitPoints.length - 1; i += 1) {
            const start = splitPoints[i];
            const end = splitPoints[i + 1];
            if ((end - start) >= SLOT_MINUTES) {
                splittableLowDensityRuns.push({ start, end });
            }
        }
    });

    const compressedGaps = [];
    let cumulativeRemoved = 0;
    for (const run of splittableLowDensityRuns) {
        const runDuration = run.end - run.start;
        if (runDuration < TIMETABLE_BREAK_MIN_GAP) continue;

        // Only compress (and therefore zigzag) gaps that can be read directly
        // from timeline labels at both boundaries.
        const hasTimelineReadableBounds = (run.start % 30 === 0) && (run.end % 30 === 0);
        if (!hasTimelineReadableBounds) continue;

        const visibleDuration = Math.min(TIMETABLE_BREAK_VISIBLE_MINUTES, runDuration);
        const removed = runDuration - visibleDuration;
        compressedGaps.push({
            start: run.start,
            end: run.end,
            visibleDuration,
            removed,
            cumulativeRemovedBefore: cumulativeRemoved,
            scale: visibleDuration / runDuration
        });
        cumulativeRemoved += removed;
    }

    const mapMinuteToVisual = minute => {
        for (const gap of compressedGaps) {
            if (minute < gap.start) {
                return minute - gap.cumulativeRemovedBefore;
            }
            if (minute <= gap.end) {
                const withinGap = minute - gap.start;
                return (gap.start - gap.cumulativeRemovedBefore) + (withinGap * gap.scale);
            }
        }
        return minute - cumulativeRemoved;
    };

    const visualDayStart = mapMinuteToVisual(baseSlotMetrics.dayStart);
    const visualDayEnd = mapMinuteToVisual(dayBounds.end);
    const slotMetrics = {
        dayStart: visualDayStart,
        totalSlots: Math.max(1, Math.ceil((visualDayEnd - visualDayStart) / SLOT_MINUTES))
    };

    const getPlacementForRange = (startMinute, endMinute) => {
        const visualStart = mapMinuteToVisual(startMinute);
        const visualEnd = mapMinuteToVisual(endMinute);
        const startSlot = Math.floor((visualStart - slotMetrics.dayStart) / SLOT_MINUTES) + 1;
        const slotSpan = Math.max(1, Math.ceil((visualEnd - visualStart) / SLOT_MINUTES));
        return { startSlot, slotSpan };
    };

    const isInsideCompressedGap = minute => compressedGaps.some(gap => minute > gap.start && minute < gap.end);

    const shell = document.createElement('div');
    shell.className = 'schedule-shell';
    shell.addEventListener('scroll', applyScrollLayout, { passive: true });
    const canvas = document.createElement('div');
    canvas.className = 'schedule-canvas';

    const headerRow = document.createElement('div');
    headerRow.className = 'room-header-row';
    headerRow.style.gridTemplateColumns = gridTemplate;

    const spacer = document.createElement('div');
    spacer.className = 'room-header-spacer';
    headerRow.appendChild(spacer);

    colRooms.forEach(room => {
        const cell = document.createElement('div');
        cell.className = 'room-header-cell';
        cell.dataset.room = room;
        cell.textContent = room;
        headerRow.appendChild(cell);
    });
    canvas.appendChild(headerRow);

    const grid = document.createElement('div');
    grid.className = 'schedule-grid';
    grid.style.gridTemplateColumns = gridTemplate;
    grid.style.gridTemplateRows = `repeat(${slotMetrics.totalSlots}, var(--slot-height))`;

    const roomIndexMap = new Map(colRooms.map((room, index) => [room, index]));
    const salonAIndex = roomIndexMap.get('Salon A');
    const salonDIndex = roomIndexMap.get('Salon D');

    const markerMinutes = new Set();
    for (let marker = dayBounds.start; marker <= dayBounds.end; marker += 30) {
        markerMinutes.add(marker);
    }
    compressedGaps.forEach(gap => {
        markerMinutes.add(gap.start);
        markerMinutes.add(gap.end);
    });

    const renderedMarkerSlots = new Set();
    [...markerMinutes].sort((a, b) => a - b).forEach(marker => {
        if (isInsideCompressedGap(marker)) return;

        const visualMarker = mapMinuteToVisual(marker);
        const startSlot = Math.floor((visualMarker - slotMetrics.dayStart) / SLOT_MINUTES) + 1;
        if (startSlot < 1 || startSlot > slotMetrics.totalSlots) return;

        const isGapBoundary = compressedGaps.some(gap => marker === gap.start || marker === gap.end);
        if (renderedMarkerSlots.has(startSlot) && !isGapBoundary) return;
        renderedMarkerSlots.add(startSlot);

        const label = document.createElement('div');
        label.className = 'timeline-slot-label';
        label.dataset.slot = startSlot;
        label.style.gridColumn = '1';
        label.style.gridRow = `${startSlot} / span 1`;
        label.textContent = formatTime(minuteToLabel(marker));
        grid.appendChild(label);

        const divider = document.createElement('div');
        divider.className = 'timeline-divider';
        if (startSlot === 1) divider.classList.add('first-slot-divider');
        divider.dataset.slot = startSlot;
        divider.style.gridRow = `${startSlot} / span 1`;
        grid.appendChild(divider);
    });

    colRooms.forEach((room, index) => {
        const background = document.createElement('div');
        background.className = 'room-column-bg';
        background.dataset.room = room;
        background.style.gridColumn = `${index + 2}`;
        background.style.gridRow = `1 / span ${slotMetrics.totalSlots}`;
        grid.appendChild(background);
    });

    compressedGaps.forEach(gap => {
        const placement = getPlacementForRange(gap.start, gap.end);
        const indicator = document.createElement('div');
        indicator.className = 'timeline-break-indicator';
        indicator.style.gridRow = `${placement.startSlot} / span ${placement.slotSpan}`;

        const label = document.createElement('div');
        label.className = 'timeline-break-label';
        const gapStartText = formatTime(minuteToLabel(gap.start));
        const gapEndText = formatTime(minuteToLabel(gap.end));
        const startLine = document.createElement('span');
        startLine.textContent = gapStartText;
        const endLine = document.createElement('span');
        endLine.className = 'to-line';
        endLine.textContent = `to ${gapEndText}`;
        label.appendChild(startLine);
        label.appendChild(endLine);

        const line = document.createElement('div');
        line.className = 'timeline-break-line';

        indicator.appendChild(label);
        indicator.appendChild(line);
        grid.appendChild(indicator);
    });

    const mealBreaks = sessions.filter(s => isMealStyleEvent(s));
    const mealTimes = mealBreaks.map(m => ({
        start: parseClockMinutes(m.time),
        end: parseClockMinutes(m.time) + getSessionDurationMinutes(dayTimes, m),
        session: m
    }));

    const checkIfTrainingSpansMeal = (session) => {
        if (session.type !== 'training') return null;
        const sessionStart = parseClockMinutes(session.time);
        const sessionEnd = sessionStart + getSessionDurationMinutes(dayTimes, session);
        for (const meal of mealTimes) {
            if (sessionStart < meal.end && sessionEnd > meal.start) {
                return meal;
            }
        }
        return null;
    };

    const normalSessions = [];
    const overlaySessions = [];
    const breakSessions = [];

    sessions.forEach(session => {
        if (isGlobalOverlayEvent(session)) {
            overlaySessions.push(session);
        } else if (session.type === 'break') {
            breakSessions.push(session);
        } else {
            normalSessions.push(session);
        }
    });

    const placeSessionPart = (originalSession, partStart, partEnd, overlay) => {
        const placement = getPlacementForRange(partStart, partEnd);
        const isAdSpanSession = originalSession.room === 'Grand Ballroom - Salons A-D';

        const wrap = document.createElement('div');
        wrap.className = 'schedule-item';
        if (overlay) wrap.classList.add('overlay-item');
        wrap.dataset.time = originalSession.time;
        wrap.dataset.room = originalSession.room;

        if (isAdSpanSession && salonAIndex !== undefined && salonDIndex !== undefined) {
            wrap.style.gridColumn = `${salonAIndex + 2} / ${salonDIndex + 3}`;
            wrap.classList.add('ad-span-item');
        } else {
            const roomIndex = roomIndexMap.get(originalSession.room);
            if (roomIndex === undefined) return;
            wrap.style.gridColumn = `${roomIndex + 2}`;
        }

        wrap.style.gridRow = `${placement.startSlot} / span ${placement.slotSpan}`;
        wrap.appendChild(createSessionCard(originalSession, false));
        grid.appendChild(wrap);
    };

    const placeSession = (session, overlay = false) => {
        const spanningMeal = checkIfTrainingSpansMeal(session);
        if (spanningMeal) {
            const sessionStart = parseClockMinutes(session.time);
            const sessionEnd = sessionStart + getSessionDurationMinutes(dayTimes, session);
            const mealStart = spanningMeal.start;
            const mealEnd = spanningMeal.end;

            if (sessionStart < mealStart) {
                placeSessionPart(session, sessionStart, mealStart, overlay);
            }
            if (sessionEnd > mealEnd) {
                placeSessionPart(session, mealEnd, sessionEnd, overlay);
            }
            return;
        }

        const sessionStart = parseClockMinutes(session.time);
        const sessionEnd = sessionStart + getSessionDurationMinutes(dayTimes, session);
        const placement = getPlacementForRange(sessionStart, sessionEnd);
        const isAdSpanSession = session.room === 'Grand Ballroom - Salons A-D';

        const wrap = document.createElement('div');
        wrap.className = 'schedule-item';
        if (overlay) wrap.classList.add('overlay-item');
        wrap.dataset.time = session.time;
        wrap.dataset.room = session.room;

        if (isGlobalOverlayEvent(session)) {
            wrap.style.gridColumn = '2 / -1';
        } else if (isAdSpanSession && salonAIndex !== undefined && salonDIndex !== undefined) {
            wrap.style.gridColumn = `${salonAIndex + 2} / ${salonDIndex + 3}`;
            wrap.classList.add('ad-span-item');
        } else {
            const roomIndex = roomIndexMap.get(session.room);
            if (roomIndex === undefined) return;
            wrap.style.gridColumn = `${roomIndex + 2}`;
        }

        wrap.style.gridRow = `${placement.startSlot} / span ${placement.slotSpan}`;

        if (isGlobalOverlayEvent(session)) {
            wrap.appendChild(createFullWidthCard(session));
        } else if (session.type === 'session' || session.type === 'training' || isSessionStyleEvent(session)) {
            wrap.appendChild(createSessionCard(session, false));
        } else {
            wrap.appendChild(createFullWidthCard(session));
        }
        grid.appendChild(wrap);
    };

    // Place a break by filling consecutive runs of empty columns at that time range.
    const placeBreakSession = (session) => {
        const breakStart = parseClockMinutes(session.time);
        const breakEnd = breakStart + getSessionDurationMinutes(dayTimes, session);
        const placement = getPlacementForRange(breakStart, breakEnd);

        // Collect column indices occupied by non-break sessions during this break window.
        const occupiedIndices = new Set();
        normalSessions.forEach(other => {
            const otherStart = parseClockMinutes(other.time);
            const otherEnd = otherStart + getSessionDurationMinutes(dayTimes, other);
            if (otherStart < breakEnd && otherEnd > breakStart) {
                // A-D span sessions occupy Salon A through Salon D indices
                if (other.room === 'Grand Ballroom - Salons A-D' && salonAIndex !== undefined && salonDIndex !== undefined) {
                    for (let i = salonAIndex; i <= salonDIndex; i++) occupiedIndices.add(i);
                } else {
                    const idx = roomIndexMap.get(other.room);
                    if (idx !== undefined) occupiedIndices.add(idx);
                }
            }
        });

        // Find consecutive runs of unoccupied column indices.
        const runs = [];
        let runStart = null;
        colRooms.forEach((room, idx) => {
            if (!occupiedIndices.has(idx)) {
                if (runStart === null) runStart = idx;
            } else {
                if (runStart !== null) { runs.push({ start: runStart, end: idx - 1 }); runStart = null; }
            }
        });
        if (runStart !== null) runs.push({ start: runStart, end: colRooms.length - 1 });

        // Place one card per column (all columns for meals, only unoccupied for breaks).
        const durationMins = getSessionDurationMinutes(dayTimes, session);
        const isMeal = isMealStyleEvent(session);
        colRooms.forEach((room, idx) => {
            if (!isMeal && occupiedIndices.has(idx)) return;
            const wrap = document.createElement('div');
            wrap.className = 'schedule-item overlay-item';
            wrap.dataset.time = session.time;
            wrap.dataset.room = session.room;
            wrap.style.gridColumn = `${idx + 2}`;
            wrap.style.gridRow = `${placement.startSlot} / span ${placement.slotSpan}`;
            // Build a per-column single-line break marker
            const card = document.createElement('div');
            card.className = 'event-card ' + (isMeal ? 'meal-col' : 'break-col');
            card.dataset.uid = session.uid || '';
            card.dataset.track = (session.Track || '').toLowerCase();
            card.dataset.title = (session.Title || '').toLowerCase();
            const lineEl = document.createElement('div');
            lineEl.className = isMeal ? 'meal-col-line' : 'break-col-line';
            lineEl.textContent = isMeal ? (session.Title || '') : getBreakDisplayTitle(session);
            card.appendChild(lineEl);
            wrap.appendChild(card);
            grid.appendChild(wrap);
        });
    };

    normalSessions.forEach(session => placeSession(session, false));
    // Overlay events (including breakfast) use smart column-filling.
    overlaySessions.forEach(session => placeBreakSession(session));
    breakSessions.forEach(session => placeBreakSession(session));

    canvas.appendChild(grid);
    shell.appendChild(canvas);
    container.appendChild(shell);
}

function renderMobileDayList(day, container) {
    const sessions = data[day] || [];
    const dayTimes = sessions.map(s => s.time);
    const sortedTimes = sortTimes(new Set(dayTimes));
    const timeGroups = {};

    sessions.forEach(session => {
        if (!timeGroups[session.time]) timeGroups[session.time] = [];
        timeGroups[session.time].push(session);
    });

    const list = document.createElement('div');
    list.className = 'mobile-day-list';

    sortedTimes.forEach(time => {
        const group = document.createElement('div');
        group.className = 'mobile-time-group';
        group.dataset.day = day;
        group.dataset.time = time;

        const label = document.createElement('div');
        label.className = 'time-col'; 
        label.textContent = formatTime(time);
        group.appendChild(label);

        const stack = document.createElement('div');
        stack.className = 'mobile-time-stack';

        (timeGroups[time] || []).forEach(session => {
            const wrap = document.createElement('div');
            wrap.className = 'mobile-card-wrap';

            if (session.type === 'session' || session.type === 'training' || isSessionStyleEvent(session)) {
                wrap.appendChild(createSessionCard(session, true));
            } else if (FULLWIDTH_ROOMS.has(session.room)) {
                wrap.appendChild(createFullWidthCard(session));
            } else {
                wrap.appendChild(createSessionCard(session, true));
            }
            stack.appendChild(wrap);
        });

        group.appendChild(stack);
        list.appendChild(group);
    });

    container.appendChild(list);
}

function renderGlobalSearchResults(container) {

                    session.Title || '',
                    session.Authors || '',
                    session.Track || '',
                    session.room || '',
                    session.Affiliation || '',
                    session.type || ''
                ].join(' ').toLowerCase();

                if (!searchableText.includes(searchQuery)) return false;
                if (isKeynoteSession(session)) return true;
                return checkTrackMatch((session.Track || '').toLowerCase());
            })
            .sort((left, right) => parseClockMinutes(left.time) - parseClockMinutes(right.time));

        if (matching.length === 0) return;

            row.dataset.time = time;

            const tCol = document.createElement('div');
            tCol.className = 'time-col';
            tCol.textContent = formatTime(time);
            row.appendChild(tCol);

            const wrap = document.createElement('div');
            wrap.style.display = 'flex';
            wrap.style.flexDirection = 'column';

    }
