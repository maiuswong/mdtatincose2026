<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>INCOSE HWGC 2026</title>

    <!-- PWA -->
    <link rel="manifest" href="manifest.webmanifest">
    <meta name="theme-color" content="#e9ecf0">
    <meta name="application-name" content="HWGC 2026">
    <meta name="description" content="INCOSE Systems Engineering in Healthcare 2026 conference schedule.">
    <link rel="icon" href="icons/icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="icons/icon.svg">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="HWGC 2026">
    <meta name="mobile-web-app-capable" content="yes">

    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@300;400;500;600;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="headerStickyStack">
<header>
    <h1>INCOSE SE in Healthcare 2026</h1>
    <div class="header-right">
        <div class="tabs" id="dayTabs"></div>
        <input type="text" id="searchBar" placeholder="Search sessions..." oninput="applyFilters()">
    </div>
</header>

<div class="track-filters" id="trackFilters"></div>
</div>
<div class="scroll-indicator-row" id="scrollIndicatorRow" aria-hidden="true">
    <div class="scroll-indicator-inner" id="scrollIndicatorInner">
        <div class="scroll-date-time-indicator" id="scrollDateTimeIndicator">
            <span class="scroll-indicator-time-wrap">
                <span class="scroll-indicator-time current"></span>
            </span>
        </div>
        <span class="scroll-indicator-day-label" id="scrollIndicatorDayLabel"></span>
    </div>
</div>

<div class="grid-outer" id="gridOuter">
    <div id="scheduleContainer"></div>
</div>

<div class="details-backdrop" id="detailsBackdrop"></div>
<aside class="details-panel" id="detailsPanel" aria-hidden="true"></aside>

<div class="share-modal" id="shareModal" aria-hidden="true">
    <div class="share-modal-box" role="dialog" aria-labelledby="shareModalTitle">
        <div class="share-modal-title" id="shareModalTitle">Scan to import</div>
        <div class="share-modal-desc">Open your phone's camera and point it at this code. Importing will <strong>replace</strong> your starred sessions on that device with these.</div>
        <div class="share-modal-qr" id="shareModalQr"></div>
        <div class="share-modal-count" id="shareModalCount"></div>
        <div class="share-modal-actions">
            <button type="button" class="starred-edit-btn" id="shareModalClose">Close</button>
            <button type="button" class="starred-edit-btn starred-edit-share" id="shareModalCopy">Copy link</button>
        </div>
    </div>
</div>

<div class="toast" id="appToast" role="status" aria-live="polite"></div>

<script src="schedule-data.js"></script>
<script src="app.js"></script>
</body>
</html>
