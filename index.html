  "Wednesday 4/29": [
    {"day":"Wednesday 4/29","time":"7:00 AM","room":"Grand Foyer","type":"event","Title":"Breakfast","SessionLength":"60m"},
    {"day":"Wednesday 4/29","time":"8:00 AM","room":"Grand Ballroom - Salons A-D","type":"session","Track":"General","Title":"Conference Kickoff & Introductions Day 2","session_id":701,"uid":"s_701"},
    {"day":"Wednesday 4/29","time":"8:30 AM","room":"Grand Ballroom - Salons A-D","type":"Keynote","Track":"General","Title":"AI and the Future of Systems Engineering - it's a Revolution","Authors":"Langdon Morris","Title":"AI and the Future of Systems Engineering… It's a Revolution","Abstract":"AI is developing at a furious pace, driven by the intense competition among the various firms that wish to dominate the future market, and by the nations that seek competitive advantage in geopolitics. This has inevitable and important implications for systems engineering, which can leverage these new AI powers to produce ever-more effective system designs, models, simulations, and digital twins. But it's important to keep in mind that whatever AI is capable of today, it will likely surpass tomorrow. Therefore, it's critical to have a clear picture of how AI is likely to evolve over the coming years, and to target your technology investments and product roadmaps to account for these ever-increasing capabilities. In this talk, Langdon will lay out a likely development path for AI and AGI over the coming years, highlighting a strategic perspective and exploring what this can mean for systems engineers, their companies, and the overall economy.","Affiliation":"InnovationLabs","session_id":702,"uid":"s_702"},
    {"day":"Wednesday 4/29","time":"10:30 AM","room":"Oxford","type":"training","Track":"Training","Title":"QMSR 2026: Key Changes for Managing Risk Across the Product Lifecycle","Abstract":"This panel focuses on the role of system engineers in designing cybersecurity controls into medical device systems. Panelists will discuss key considerations for integrating security early in the system lifecycle, including system architecture, risk management, interface design, and cross-functional collaboration. Drawing on real-world experience, the discussion will highlight practical strategies system engineers can use to balance cybersecurity, safety, usability, and regulatory expectations while building resilient medical device systems. FDA's adoption of ISO 13485 into QMSR increases the emphasis on risk management throughout development. The standards' definition of risk moves beyond failures to focus on harms and hazards, and away from isolated deliverables. This increased risk focus may prompt some companies to rethink their approach during development and production. The importance of risk as a continuum of activity moves us from outdated processes of design and use FMEAs to modern, comprehensive, and integrated approaches.\n\nThis workshop will focus on the following elements that are critical to modern development:\n\n• Using a tool-based risk process for system engineering complexity\n• Assessing how failures and usability roll into the risk analysis\n• Using active continuous analysis of risk throughout the product lifecycle\n• Meeting the increased emphasis on risk by aligning with ISO 14971\n• The workshop will use a database solution to explore how design elements can be brought together, making embedded risk efficient and effective. It is ideal for engineers with a general understanding of risk management who want to explore how a tool can help and how the various elements of risk must be considered holistically and comprehensively.\n\nParticipants will increase their understanding of the interrelationships among risk and reliability tools, how using a database solution improves success, especially with complex systems, and why changes to the regulations mean a greater focus on risk management.","Authors":"Sally Carter and Patrick Maxwell","Affiliation":"Cognition Corporation","SessionLength":"3h 30m","isMedtronic":false,"session_id":802,"uid":"s_802"},
    {"day":"Wednesday 4/29","time":"10:30 AM","room":"Bristol","type":"training","Track":"Training","Title":"SysML v2 Tutorial","Abstract":"The Object Management Group (OMG) has been working for many years on the next generation language for Model-Based System Engineering (MBSE) – the Systems Modeling Language (SysML) Version 2. SysML v2 builds on the success of SysML v1 and lessons learned to deliver a brand-new language that address the shortcomings of SysML v1 (and some idiosyncrasies due to its UML v2 foundation) and adds significant new capabilities and features (delivered in part by its foundation on the new Kernel Model Language – KerML).\n\nA provocative new feature of SysML v2 is its textual notation. Participants will be exposed to both the graphical and textual notation of key SysML v2 view definitions (i.e. diagrams, matrices, and reports) such as package views, requirement views, definition and usage views, interconnection views, action flow views, sequence views, and state transition views using a simple case study. \n\nAttendees will have a hands-on opportunity to build a SysML v2 model with the SysIDE tool from Sensmetry using their cloud platform. Depending on time, attendees may also be able to leverage SysIDE AI capabilities to interact with the model and demonstrate how to access the SysML v2 model using Python code. \n\nThe speaker will also provide updates from the Object-Oriented Systems Engineering Method (OOSEM) v2.0 workgroup that is a collaboration between INCOSE and the OMG.","Authors":"Chris Armstrong","Affiliation":"INCOSE","SessionLength":"3h 30m","isMedtronic":false,"session_id":803,"uid":"s_803"},
    {"day":"Wednesday 4/29","time":"10:00 AM","room":"Grand Foyer","type":"break","Title":"Break","SessionLength":"30m"},
    {"day":"Wednesday 4/29","time":"10:30 AM","room":"Junior Ballroom","type":"session","Track":"AI/ML","Title":"The Year the Future Arrived: What Your Team Must Do - Now","Authors":"Stephen Zielinski","Abstract":"Last year's talk, and this year's keynote, offered a forecast—a glimpse into the coming wave of AI/ML transformation in healthcare systems engineering. That wave is no longer on the horizon. It's breaking on the shore. In this urgent, forward-focused session, we'll revisit last year's predictions to ground ourselves in what's materialized—and what hasn't. But the heart of this talk is action. This is your checklist for the coming year: the essential, specific, and time-sensitive competencies every systems engineer must master to stay relevant, impactful, and future-ready. We'll cover the tools, workflows, data strategies, regulatory impacts, and collaboration models you need to adopt now—not next quarter. The clock is ticking, and systems engineers have never had a more critical role to play. Come ready to update your roadmap and leave with a practical to-do list for the months ahead.","Affiliation":"Clairio","SessionLength":"30m","isMedtronic":false,"session_id":54,"uid":"s_54"},
    {"day":"Wednesday 4/29","time":"10:30 AM","room":"Salon A","type":"session","Track":"Cybersecurity","Title":"Securing the System: Understanding How to Apply the FDA Cybersecurity Guidance","Authors":"Matthew Hazelett","Abstract":"Historically, submissions were focused on just the subject device seeking FDA authorization. The FDA Cybersecurity Guidance recommendations apply to the end-to-end \"medical device system.\" Evaluating cybersecurity across the system is important for surfacing relevant risks and identifying appropriate controls to incorporate in response. This session will discuss applying the FDA Cybersecurity Guidance across different types of systems to better prepare Systems Engineers for the considerations needed and documentation needed for submissions.","Affiliation":"MedSec","SessionLength":"60m","isMedtronic":false,"session_id":47,"uid":"s_47"},
    {"day":"Wednesday 4/29","time":"10:30 AM","room":"Salon B","type":"session","Track":"Combination Products","Title":"Entering the combination products space: What are they, how are they regulated, dos and don'ts for developers and supplier?","Authors":"John Weiner","Abstract":"Are you developing a combination product? Do you know whether you are? Are you looking up to market devices to combination product developers/sponsors? Former FDA lead for combination products program development and implementation will introduce core concepts, including what combination products are, regulatory principles and elements across the product lifecycle from development through manufacture and post market controls. He will highlight key considerations for how establishing and maintaining effective, efficient, compliant systems as a combination product developer/sponsor, and for understanding and managing expectations as a supplier to these entities.","Affiliation":"Barr Consulting LLC","SessionLength":"60m","isMedtronic":false,"session_id":70,"uid":"s_70"},
    {"day":"Wednesday 4/29","time":"10:30 AM","room":"Salon C","type":"session","Track":"Digital SE","Title":"Improving Medical Device Safety Through MBSE Integrated FMEA and Fault Simulation","Authors":"Pourash Patel","Abstract":"The reliability of alarm systems in life supporting medical devices is fundamental to patient safety. Standards such as IEC 60601 1 12 require that high priority alarms, such as ventilator high pressure or infusion pump occlusion alarms, be verified to operate correctly under single fault conditions. Conventional safety analyses, including Failure Mode and Effects Analysis (FMEA) and Hazard Analysis, rely on manual logical reasoning that can introduce inconsistencies and undermine safety assurance. This work presents a Model Based Systems Engineering (MBSE) workflow that formally validates the Method of Control for each identified failure mode through model integrated fault injection. The approach executes each fault scenario derived from the fault tree across a range of device configurations, patient categories, and clinically relevant complications. Simulation outcomes provide objective, repeatable evidence of intended alarm behavior. Results demonstrate that integrating MBSE with fault injection analysis reduces logical error rates and enhances the completeness and traceability of safety verification activities. Applying this methodology early in the development cycle enables earlier detection of design deficiencies and supports a more robust safety case for medical device.","Affiliation":"MathWorks","SessionLength":"30m","isMedtronic":false,"session_id":4,"uid":"s_4"},
    {"day":"Wednesday 4/29","time":"10:30 AM","room":"Salon D","type":"session","Track":"Reqs, Test & Risk","Title":"From Needs to Reusable Evidence: A Systems Framework for Medical Device Platforms","Authors":"Sri Harsha Maramraju","Abstract":"Developing reusable medical device platforms presents a systemic challenge: generating compliant, reusable V&V evidence for diverse product lines. This presentation details a formal Product Line Engineering (PLE) framework that treats a reusable subsystem as an internal product, enabling accelerated time-to-market for distinct applications.\n\nThe session provides a practical roadmap for transforming needs into a robust library of reusable evidence, illustrated with cross-industry examples. Key takeaways for practitioners include:\n1.  A Dual-Input Model: Partitioning design inputs into Market-Facing Needs (e.g., performance, usability) and internal Operational Requirements (e.g., COGS, yield).\n2.  The \"Analysis Record\" as a Justification Bridge: Using a formal analysis report to systematically decompose system-level needs (e.g., ±5% dose accuracy) into verifiable technical requirements.\n3.  A \"Linked-Pair\" Traceability Strategy: Formally linking a Product Need (\"deliver X\") to a Platform Need (\"enable X\") to ensure clear accountability and facilitate evidence reuse.\n4.  The Reusable \"Chassis\" Concept: Expanding the platform boundary to include a validated structural packaging chassis, allowing product teams to bypass redundant physical V&V for new SKUs.\nThis presentation provides a field-tested Systems Engineering framework for building a scalable and compliant PLE strategy, offering a high-leverage approach for any organization developing complex medical systems.","Affiliation":"Dexcom","SessionLength":"60m","isMedtronic":false,"session_id":8,"uid":"s_8"},
    {"day":"Wednesday 4/29","time":"11:00 AM","room":"Junior Ballroom","type":"session","Track":"AI/ML","Title":"AI in Gastroenterology: Revolutionizing Care and Documentation","Authors":"Senthil Kumaran","Abstract":"As gastroenterology practices strive for enhanced clinical precision, streamlined workflows, and improved patient-provider relationships, the integration of artificial intelligence (AI) offers a transformative solution. This submission explores how AI is revolutionizing the field by focusing on two core applications: advanced procedural assistance and intelligent documentation. We will highlight the GI Genius™ module, an AI-powered system that provides real-time visual assistance during colonoscopies. This technology has demonstrated a significant increase in the adenoma detection rate (ADR) by up to 14.4%, a crucial metric for reducing the risk of colorectal cancer. We will discuss the role of ambient AI, in streamlining administrative burdens. By seamlessly capturing and structuring patient-provider conversations, these systems save clinicians 1–2 hours daily on documentation tasks and help combat professional burnout. This technological EMR/PM integration not only enhances the quality of clinical notes but also improves the patient experience by allowing clinicians to focus fully on the individual rather than the screen. The presentation will demonstrate how the strategic implementation of these AI solutions drives tangible improvements in efficiency, clinical outcomes, and provider retention, creating a more sustainable and patient-centric healthcare environment.","Affiliation":"MNGI","SessionLength":"60m","isMedtronic":false,"session_id":59,"uid":"s_59"},
    {"day":"Wednesday 4/29","time":"11:00 AM","room":"Salon C","type":"session","Track":"Digital SE","Title":"Building Better Verification: Assembling Automated Protocols One 'LEGO Block' at a Time","Authors":"Maius Wong, Joseph Green and Joshua Zehoski","Abstract":"Model-Based Systems Engineering (MBSE) modeling captures a comprehensive system architecture and design with associated requirements management for complex medical device systems, but the resulting testing volume can pose significant challenges for traditional manual verification activities. The MBSE model's use of variation points, nested architectures, and other modeling techniques can exponentially increase the potential number of test cases. To address this, a scalable automation framework utilizing a \"LEGO block\" strategy was developed, in which automated analysis and reuse of the MBSE model elements allow for dynamic assembly into detailed test protocols, ensuring systematic coverage of diverse device configurations and workflows. Additionally, the framework automates the execution of test protocols through cross-platform scripting and test automation tools, ensuring consistent and repeatable verification. Practical application of this approach resulted in a 60% reduction in test execution time while maintaining comprehensive coverage of system variations. By combining MBSE-driven requirements management with modular automation for both protocol generation and execution, this framework significantly enhances the efficiency, reliability, and scalability of verification processes in medical system development.","Affiliation":"Medtronic","SessionLength":"30m","isMedtronic":true,"session_id":34,"uid":"s_34"},
    {"day":"Wednesday 4/29","time":"11:30 AM","room":"Salon A","type":"session","Track":"Sponsor","Title":"Premier Sponsor Presentation: Dassault","Abstract":null,"Affiliation":"Dassault","SessionLength":"30m","isMedtronic":false,"session_id":907,"uid":"s_907"},
    {"day":"Wednesday 4/29","time":"11:30 AM","room":"Salon B","type":"session","Track":"Combination Products","Title":"Product Quality Risk In Combination Product Development","Authors":"David Cronin","Abstract":"To minimize patient risk with a combination product, we must manage the intersection of drug and device risk during product development. This presentation provides an introduction to an overall Product Quality Risk Framework that incorporates risk from the device, the drug product, and the manufacturing of the drug product. As the combination product market grows, pressure grows on teams to manage the interaction of 14971 and Q9.","Affiliation":"Cognition Corporation","SessionLength":"30m","isMedtronic":false,"session_id":60,"uid":"s_60"},
    {"day":"Wednesday 4/29","time":"11:30 AM","room":"Salon C","type":"session","Track":"Digital SE","Title":"Choosing your own MBSE Adventure: SysML v1 and v2, and what they mean for you","Authors":"Jeff Seufer and Marissa Meyer","Abstract":"SysML V2 is a new language to implement Model Based Systems Engineering (MBSE). SysML v1.0 was introduced in 2007 and iterated up to the latest release of v1.7 in 2024. Throughout the constant development of the language, gaps were identified and limitations existed which did not align with the rapidly evolving Digital Engineering ecosystems across many industries. Attendees will be introduced to the fundamentals implemented in SysML v1 and the changes which are essential to SysML v2. This presentation will discuss the broadening of the language into textual plus graphical notations and how this will impact systems design of the future. After that, we will discuss the latest released specification and the implications of not only a standardized language, but also standard transformation from v1 to v2 and a standard API for enhanced tool integrations. Lastly, a brief demo will show the interface of CATIA Magic to demonstrate how both textual and graphical modeling are necessary when building in SysML v2.\n\nLearning Objectives:\n• Learn the basics of SysML as a syntax for Model Based Systems Engineering\n• Learn the differences between SysML V1 and V2\n• Considerations for when to transition to SysML V2\n• Learn how to model a healthcare device using different methodologies","Affiliation":"Dassault Systemes","SessionLength":"30m","isMedtronic":false,"session_id":11,"uid":"s_11"},
    {"day":"Wednesday 4/29","time":"11:30 AM","room":"Salon D","type":"session","Track":"Reqs, Test & Risk","Title":"Shift-Left Success: Building It Right the First Time","Authors":"Kristen Swope and Vandhana Narayanan","Abstract":"With the increasing complexity of healthcare and medical device systems, the traditional practices of treating Design Validation as a late-stage activity may be costly and inefficient. Issues can arise such as delays in product launches, defects and complaints found from the field, and costly rework. This session dives into evolving this conventional mentality and introduces the concept of a Design Validation Driven V-model. This presentation will showcase how early Design Validation planning and practices can lead to building the right product for the customer the first time. Real world examples and tools will be explored including early validation planning concepts such as a User Needs best practices framework, a Validation Planning Matrix, and early execution of dry run testing and labs with end users. Overall, attendees will gain actionable strategies to “shift left” and embed Design Validation earlier in the product development lifecycle.","Affiliation":"Stryker","SessionLength":"30m","isMedtronic":false,"session_id":52,"uid":"s_52"},
    {"day":"Wednesday 4/29","time":"12:00 PM","room":"Grand Ballroom","type":"event","Title":"Lunch","SessionLength":"60m"},
    {"day":"Wednesday 4/29","time":"1:00 PM","room":"Junior Ballroom","type":"session","Track":"AI/ML","Title":"De-mystifying the Hype: Distinguishing GenAI Opportunities from Process Automation in FDA Design Controls","Authors":"Sri Harsha Maramraju","Abstract":"As medical device manufacturers adopt Artificial Intelligence, confusion may emerge regarding the distinct roles of Generative AI (GenAI) and Process Automation. In the context of FDA Design Controls, misapplying these technologies creates compliance challenges. Using a Large Language Model to \"guess\" traceability links introduces probabilistic errors, whereas relying on rigid automation for requirements remediation misses the semantic capabilities of modern tools.\n\nThis presentation provides a strategic framework for Systems Engineering leaders to categorize modernization efforts. It distinguishes between \"Probabilistic\" tasks suitable for GenAI—focusing on semantic analysis and content classification—versus \"Deterministic\" tasks requiring automation to ensure the structural integrity and traceability of the Design History File (DHF).\n\nReal-world scenarios involving complex standard hierarchies, such as the IEC 60601 family, illustrate how a hybrid approach functions. The session offers a decision matrix for tool selection, helping teams architect a digital ecosystem that leverages the creativity of GenAI for classification and authoring while enforcing the integrity of Automation for the audit trail. This approach balances innovation with the rigor required for regulatory submissions, ensuring that efficiency does not compromise the objective evidence needed for clearance.","Affiliation":"Dexcom","SessionLength":"60m","isMedtronic":false,"session_id":10,"uid":"s_10"},
    {"day":"Wednesday 4/29","time":"1:00 PM","room":"Salon A","type":"session","Track":"Cybersecurity","Title":"Closing the Loop: Traceability Across Medical Device Cybersecurity Documentation","Authors":"Jacob Miller and Bo Lanham","Abstract":"Medical Device Manufacturers are working to build their product security programs to meet modern expectations, especially with heightened regulatory requirements. This process can be challenging and burdensome to those manufacturers who are just beginning their journey. With this in mind, it can be difficult for new cybersecurity engineers to \"see the forest from the trees\", meaning that they are often doing each individual activity without understanding how said activities fit together to result in a more secure medical device.\n\nIn this presentation, the presenters will draw from their experiences as Medical Device Cybersecurity Engineers to walk the attendees through the value behind activities like vulnerability scanning, threat modeling, and penetration testing and best practices on tracing the results of this activity into a Security Risk Assessment. The presenters will detail best practices on scoring of threat events, identifying effective security controls, tracing security controls to requirements, and tracing security requirements to V&V testing evidence.\n\nFinally, the presenters will discuss how to handoff security risks with potential to impact patient safety to the safety risk management process and common pitfalls. Attendees will leave with an understanding of why each of these activities is important and how it fits into the greater secure development lifecycle of a medical device and a plan to effectively trace their work throughout the lifecycle.","Affiliation":"Bayer Radiology & MedSec","SessionLength":"60m","isMedtronic":false,"session_id":15,"uid":"s_15"},
    {"day":"Wednesday 4/29","time":"1:00 PM","room":"Salon B","type":"session","Track":"Combination Products","Title":"Breaking Free from Groundhog Day: Leveraging Platform Asset Libraries for Molecule-Agnostic Combination Product Design","Authors":"Joseph Rayes","Abstract":"Same test. Different molecule. Repeat. If your combination product development feels like Groundhog Day—proving the same device performance, reliving the same review meetings, having leverage conversations that never stick—you're not alone. As portfolios scale, the program-by-program approach becomes a trap: redundant work, inconsistent rationale, and no coherent baseline. \n\nThe challenge isn't efficiency; it's the absence of a systematic way to determine what can be leveraged versus what requires novel development. Without deliberate architecture, February 3rd never comes. \n\nThis session addresses both dimensions: \n• Technically, the presenter shares early experiences building platform asset libraries spanning design inputs and outputs, establishing design spaces that allow programs to configure rather than recreate. Central is a decision framework: a structured method for answering \"can we leverage this?\" with explicit criteria rather than case-by-case judgment. \n• Organizationally, the session confronts the harder truth: technical architecture is the easy part. The real work is changing mental models, governance processes, and organizational habits—combating resistance, gaining alignment in committee-driven environments, and evolving governance to focus on what's truly different. \n\nThis work is maturing, and the session invites dialogue. Attendees will leave with questions to challenge their own Groundhog Day and a vision for February 3rd.","Affiliation":"INCOSE","SessionLength":"30m","isMedtronic":false,"session_id":43,"uid":"s_43"},
    {"day":"Wednesday 4/29","time":"1:00 PM","room":"Salon C","type":"session","Track":"Healthcare Delivery","Title":"First, Help the Human: How Fundamental Human Needs can be systematically integrated into healthcare","Authors":"Jennifer Russell and Sharon Hartzel","Abstract":"The purpose of healthcare is to improve the lives of patients. With the wide array of tasks, supporting tools, and technology that create a healthcare environment, it is easy to lose track of the human on the receiving end of the care. The H9 Framework is a new process to specifically consider fundamental human needs. Based on the nine Fundamental Human Needs defined in the 1990s, the H9 Framework provides a systematic way to evaluate how the needs are fulfilled within the scope of a project or service. Based on current best practice for social planning, human needs integration, and systems engineering, the Framework provides a tangible way to integrate human-centered approaches into planning and daily activities.\n\nAttendees will:\n• Understand the Fundamental Human Needs and how important they are to successful implementation.\n• Understand a process to systematically analyze the whole person experience.","Affiliation":"NSI Advisory Services and INCOSE Smart Cities and Great Plains Chapter","SessionLength":"60m","isMedtronic":false,"session_id":64,"uid":"s_64"},
    {"day":"Wednesday 4/29","time":"1:00 PM","room":"Salon D","type":"session","Track":"Digital SE","Title":"Same Taste, Fewer Calories - Tailoring Your MBSE Effort","Authors":"Casey Medina","Abstract":"Model_Based Systems Engineering (MBSE) can greatly improve clarity, traceability, and risk management in medical device development, but many teams struggle to determine how much modeling is truly necessary. This presentation offers a practical approach for planning a right_sized MBSE effort that aligns with regulatory expectations and organizational capabilities. Attendees will gain actionable guidance for deploying MBSE in medical device environments, including how to tailor SysML usage, avoid over_modeling, and build a sustainable modeling practice that supports quality and development speed.","SessionLength":"60m","isMedtronic":false,"session_id":1,"uid":"s_1"},
    {"day":"Wednesday 4/29","time":"1:30 PM","room":"Salon B","type":"session","Track":"Combination Products","Title":"From Spreadsheets to Systems Models: Evaluating MBSE for Process Parameter Criticality Assessment in Allogeneic CAR-T Cell Therapy Development","Authors":"Kristina Carroll","Abstract":"ICH Q8(R2) defines a critical process parameter (CPP) as one whose variability impacts a critical quality attribute (CQA) and should be controlled to ensure product quality. ICH Q11 requires that criticality assessments be supported by risk assessments and experimental investigation. For allogeneic CAR-T cell therapies, each process parameter must be evaluated against multiple CQAs, assigned an impact rating, and linked to specific experimental results justifying that classification. Current industry practice relies on spreadsheet-based tools, creating significant vulnerabilities: fragile traceability between ratings and experimental data, poor version control, and rationale disconnected from assessments—making regulatory submissions difficult to defend. This presentation evaluates applying Model-Based Systems Engineering using SysML to process parameter impact assessment. We examine whether MBSE tools can represent process parameters, CQAs, impact ratings, and linkages to experimental evidence while maintaining ICH-required traceability. The evaluation identifies where native SysML functionality suffices and where methodology development, profile extensions, or custom tooling may be necessary. Practical guidance will be provided for organizations seeking improved documentation rigor consistent with ICH Q8, Q9, and Q11.","Affiliation":"Studio SE. Ltd","SessionLength":"30m","isMedtronic":false,"session_id":31,"uid":"s_31"},

    {"day":"Wednesday 4/29","time":"4:00 PM","room":"Junior Ballroom","type":"session","Track":"Combination Products","Title":"Roundtable: Device-Drug Interactions: What Can Go Wrong","Authors":"David Cronin, Joseph Rayes, John Weiner and Thomas Bradley","Abstract":"This is first year of HWG including a Combination Products speaking track. At this roundtable, our goal is to expand on topics covered in the talks, and provide an open forum for discussion about all topics related to Combination Product development. We will being with short presentations from three speakers, and then spend most of our time in open Q&A/discussion format. We will also discuss how to expand Combination Products presentations for next year, and how to attract pharmaceutical attendees for next year.","Affiliation":"Cognition Corporation, Eli Lilly and Company, and Barr Consulting","SessionLength":"60m","isMedtronic":false,"session_id":88,"uid":"s_88"},

    {"day":"Thursday 4/30","time":"8:00 AM","room":"Junior Ballroom","type":"session","Track":"AI/ML","Title":"How AI is Helping Software to Eat the Worlds of Mechanical and Electrical Engineering","Abstract":"Marc Andreessen famously declared that software is eating the world. Nowhere is that transformation more disruptive — or more promising — than in the traditionally hardware-dominated disciplines of mechanical and electrical engineering. Generative AI, combined with the explosive growth of Python-based engineering libraries, is quietly eroding the boundary between software and physical design.\n\nThis talk explores how LLMs paired with tools like SKiDL, KiCad scripting, CadQuery, and FreeCAD's Python API are enabling engineers to generate ASIC layouts, board-level schematics, and 3D mechanical geometries from high-level natural language specifications and parametric code. What once required deep specialist expertise and weeks of manual iteration can increasingly be scaffolded, drafted, and explored in hours — with AI acting as a knowledgeable co-designer that understands both the intent and the constraints.\n\nFor medical device R&D teams, the implications are significant. Spec-driven generative workflows mean that a systems engineer can describe a sensor housing, an analog front-end circuit, or a custom ASIC function in structured natural language and receive a credible, iteratable design artifact — not a finished product, but a validated starting point that compresses the earliest and most expensive phases of hardware development.\n\nThis talk will ground these concepts in concrete examples, honestly assess where the technology is mature versus where it oversells itself, and offer a practical lens for medical device teams evaluating whether and how to integrate generative hardware design into their R&D workflows.","Affiliation":"Clairio","SessionLength":"30m","isMedtronic":false,"session_id":93,"uid":"s_93"},
    {"day":"Thursday 4/30","time":"8:00 AM","room":"Salon A","type":"session","Track":"Cybersecurity","Title":"Why Threat Modeling Fails in Medical Devices and How Systems Engineers Can Fix It","Authors":"Vince Nguyen","Abstract":"Medical Device Manufacturers are doing more threat modeling than ever before, yet the result of this activity often still fails to identify meaningful design weaknesses and provide actionable guidance to engineering teams on how to build security into their medical devices. In this talk, the presenter will use his years of first-hand experience as a professional medical device threat modeler, both as an engineer at a medical device manufacturer and as a consultant, to highlight the reasons why threat modeling fails. Some areas of failure that will be explored include limited visibility into off-the-shelf components purchased from suppliers, not performing the analysis at a deep enough level, lack of cross-functional communication and collaboration, and arbitrarily marking areas as out-of-scope. After discussing each of these issues, the presenter will provide actionable guidance to attendees on how they can avoid these mistakes and maximize the value of threat modeling in their organization.","Affiliation":"MedSec","SessionLength":"60m","isMedtronic":false,"session_id":14,"uid":"s_14"},
    {"day":"Thursday 4/30","time":"8:00 AM","room":"Salon B","type":"session","Track":"Beyond the System","Title":"From Mission to Medical: Applying Defense Digital Strategies to Medical Ecosystems","Authors":"Eli Wilson and Suresh Narayanan","Abstract":"Healthcare systems have hit a complexity ceiling where paper-based engineering no longer ensures market access. Transitioning to digital is risky; Defense spent a decade learning that maturity requires more than hype—it demands synchronized methods, integrated tools, and cultural change. This session provides a roadmap to skip these mistakes. We equip attendees with architectural patterns and inquiries to lead a digital transformation, focusing on these strategies:\n• Automate Regulatory Evidence: Structure the design history file (DHF) as a natural engineering byproduct rather than a manual burden.\n• Maintain Technical Flexibility: Apply modular design principles to ensure long-term interoperability and avoid total system redesigns.\n• Enrich Multidisciplinary Models: Integrate safety, cybersecurity, and reliability analyses directly into the system model to serve all data consumers.\n• Optimize the Care Continuum: Apply a system-of-systems lens for enterprise trade studies evaluating device impact on patient and hospital operations.\nLearn the hallmarks of a simulation-ready organization and discover how to navigate the shift toward a mature, patient-centric digital future.","Affiliation":"STC, an Arcfield Company & SEaMSer Consulting, LLC","SessionLength":"60m","isMedtronic":false,"session_id":5,"uid":"s_5"},
    {"day":"Thursday 4/30","time":"8:00 AM","room":"Salon C","type":"session","Track":"Healthcare Delivery","Title":"Modeling the Healthcare Ecosystem: A Traceable, Multi-Layer Digital Architecture Using the Unified Architecture Framework (UAF)","Authors":"Ola Batarseh, Kavitha Chandra and Emi Aoki","Abstract":"Healthcare delivery environments are complex, multi-stakeholder ecosystems characterized by fragmented information flows, heterogeneous systems, evolving regulatory constraints, and growing demands for transparency, quality, and sustainability. This paper presents a model-based systems engineering (MBSE) approach, grounded in the Unified Architecture Framework (UAF), to structure and analyze the healthcare enterprise as an integrated, traceable digital architecture. The work introduces a reference healthcare ecosystem architecture capturing key elements including stakeholders, operational activities, clinical and enterprise capabilities, enabling services and systems, data exchanges, and regulatory drivers. Stakeholder needs are translated into architectural viewpoints spanning strategic, operational, services, resources, and standards domains. The resulting UAF model enables end-to-end traceability from stakeholder needs to capabilities, operational processes, services, systems, and compliance requirements. Using this integrated architecture, the presentation shows how UAF supports digital-thread visibility across clinical and administrative workflows, enables impact and dependency analysis for capability gaps and modernization decisions, and facilitates evaluation of risks and trade-offs. This work demonstrates how MBSE and UAF improve decision-making and alignment across healthcare stakeholders.","Affiliation":"University of Massachusetts Lowell","SessionLength":"60m","isMedtronic":false,"session_id":22,"uid":"s_22"},
    {"day":"Thursday 4/30","time":"8:00 AM","room":"Salon D","type":"session","Track":"Reqs, Test & Risk","Title":"What is Really Stopping You From Adopting Requirements Management Tools?","Authors":"Michael Casper and Patrick Maxwell","Abstract":"Requirements management tools can significantly improve product development outcomes and support effective Design History File (DHF) management—yet many teams still hesitate to adopt them. This session will share practical lessons learned from transitioning from spreadsheet-based requirements tracking to a structured, scalable requirements management environment. Drawing on real-world experience, the session will explore common barriers to adoption, including organizational readiness, perceived complexity, and concerns about scalability for smaller teams. Attendees will gain insight into how teams can begin using requirements management tools in a pragmatic way— leveraging immediate benefits while establishing a foundation that supports future growth in systems engineering maturity. This presentation is particularly relevant for small to mid-sized teams seeking to strengthen their requirements practices without overengineering their processes, offering actionable guidance on how to align tools, workflows, and team capabilities as systems engineering needs evolve.","Affiliation":"Smith & Nephew & Cognition Corp","SessionLength":"30m","isMedtronic":false,"session_id":26,"uid":"s_26"},
    {"day":"Thursday 4/30","time":"8:30 AM","room":"Junior Ballroom","type":"session","Track":"AI/ML","Title":"System Engineering and AI Driven: UserVoices to Solutions Design Process","Authors":"Rajat Gupta, John Mehawej, Sharon Wright and Jeffrey Zweber","Abstract":"The integration of Systems Engineering principles with Artificial Intelligence (AI) is redefining design methodologies by bridging user needs and business objectives. This study explores the “User Voice” to “Epic” to “Feature” design process, where Systems Engineering techniques capture user voices, group them into personas, and align them with overarching business requirements. Once aligned, Epics and features are extensively defined and prioritized by stakeholders to ensure alignment with strategic goals. An AI-driven approach is utilized to dissect user stories, evaluate their quality based on predefined scoring rules, and ensure they adhere to standards of clarity, completeness, and feasibility. By automating the analysis and scoring process, AI enhances accuracy, reduces manual effort, and accelerates decision-making. This structured methodology facilitates the seamless transition from user inputs to actionable Epic's and features, fostering efficiency and collaboration. The study highlights the synergy between Systems Engineering and AI, presenting a robust framework for delivering user-centered, business-aligned solutions.","Affiliation":"Medtronic Inc","SessionLength":"60m","isMedtronic":true,"session_id":27,"uid":"s_27"},
    {"day":"Thursday 4/30","time":"8:30 AM","room":"Salon D","type":"session","Track":"Reqs, Test & Risk","Title":"Using a Requirements Management tool for Defect Management","Authors":"Christopher Unger","Abstract":"GEHC is moving to a new requirements and test management tool after 25 years using DOORS. We are moving most of our SE \"document\" processes into the new tool. One of those functions is Issue and Defect management. We have a dedicated tool for defects (our third iteration) and there is concern whether a \"requirements tool\" can support all our functions. This presentation describes how we use systems engineering to identify and retire the key risks.","Affiliation":"Practical SE, LLC and GE Healthcare","SessionLength":"30m","isMedtronic":false,"session_id":46,"uid":"s_46"},
    {"day":"Thursday 4/30","time":"9:00 AM","room":"Salon A","type":"session","Track":"Cybersecurity","Title":"Security Risk Estimation in Medical Device Systems Engineering: A Comparative Analysis of Ten Assessment Methodologies","Authors":"Matthew Vorhees and Michelle Jump","Abstract":"Medical device security risk management requires systematic estimation methods to evaluate vulnerability exploitability and impact, yet practitioners face significant challenges in selecting appropriate methodologies that align with regulatory requirements and organizational needs. AAMI's Technical Information Report (TIR) 126 addresses this gap by establishing objective review criteria and conducting comparative analysis of ten security risk estimation methodologies within the context of ANSI/AAMI SW96:2023 requirements. The work identifies several challenges that affect security risk estimation accuracy and reproducibility, including the shift from probabilistic to non-probabilistic approaches, distinction between security weaknesses and known vulnerabilities, and integration with ISO 14971 safety risk processes.  The report provides structured evaluation criteria that enable medical device manufacturers to select methodologies appropriate to their specific product ecosystems and clinical workflows while maintaining regulatory compliance and defensible documentation. This systems engineering approach to security risk estimation standardization advances industry capability to make consistent, informed, and reproducible risk management decisions across the medical device development lifecycle.","Affiliation":"Medtronic & MedSec","SessionLength":"30m","isMedtronic":true,"session_id":48,"uid":"s_48"},
    {"day":"Thursday 4/30","time":"9:00 AM","room":"Salon B","type":"session","Track":"Beyond the System","Title":"Executable by Design: Computational Thinking for Speed and Scale in Systems Engineering","Authors":"Joshua Zehoski and Joseph Green","Abstract":"Systems engineering has long valued rigor in thinking, yet much of that rigor remains locked in static documents and manual processes punctuated by disjointed tools. Computational thinking - decomposing problems, formalizing intent, and structuring information for execution - creates a bridge from data and hypotheses to insight and action. Applying a computational thinking mindset coupled with the growing capabilities of Generative AI, MBSE, and Continuous Integration enables systems engineers to rapidly move from intent to SE task execution across the system development lifecycle. This presentation will explore:\n• How Generative AI acts as a force multiplier for turning computational thinking into executable code that shifts effort from document production to insight generation\n• The virtuous cycle of Model-Based Systems Engineering acting as both a driver and beneficiary of better structuring data for computation\n• The skills and capabilities individuals and systems engineering organizations need to take advantage of this shift\n\nThe result is systems engineering that is executable by design—faster, more scalable, and better aligned with the complexity of modern healthcare systems.","Affiliation":"Medtronic","SessionLength":"30m","isMedtronic":true,"session_id":42,"uid":"s_42"},
    {"day":"Thursday 4/30","time":"9:00 AM","room":"Salon C","type":"session","Track":"Healthcare Delivery","Title":"Integrating Systems Engineering into Value-Based Care and Population Health Payment and Healthcare Delivery Models","Authors":"Sharon Hartzel","Abstract":"Integrating systems engineering into value-based and population health models offers a structured approach to managing complexity, improving outcomes, and controlling costs in healthcare delivery. By applying principles such as systems thinking, process design, and performance optimization, risk-bearing entities can better coordinate care and manage ongoing, long-term patient needs. This approach enables the intentional design of chronic disease care pathways, reduces unwarranted variation in clinical outcomes and spending, and strengthens population health workflows including attribution, stratification, and care gap management. Additionally, well-defined system architectures and feedback loops support continuous quality improvement, data-driven decision-making, and scalable operations aligned with evolving reimbursement and accountability frameworks. Ultimately, this integration enhances value-based care performance by improving quality metrics, lowering total cost of care, and supporting more predictable financial and clinical outcomes.","Affiliation":"NSI Advisory Services","SessionLength":"90m","isMedtronic":false,"session_id":66,"uid":"s_66"},
    {"day":"Thursday 4/30","time":"9:00 AM","room":"Salon D","type":"session","Track":"Reqs, Test & Risk","Title":"Rethinking Accuracy Evaluation in Surgical Robotics: A Systems-Engineering Framework for Verification Without Post-Operative Image Dependence","Authors":"Casey McBride","Abstract":"Postoperative CT imaging is commonly used to evaluate accuracy in image dependent orthopedic robotic systems, but it carries significant drawbacks, including high cost, long processing times, metal artifacts, and limited ability to identify the sources of accuracy errors. These constraints hinder requirements decomposition, complicate verification planning, and reduce traceability across tracking, registration, and execution subsystems. Here we present a model based requirements and test architecture that separates accuracy into independent registration and execution domains, each verified through targeted test methods. Representative requirement categories—such as registration transformation error, point to surface accuracy, implant placement tolerances, and tool tracking limits—illustrate how structured requirements and matching test strategies improve testability and fault isolation while reducing reliance on postoperative imaging. The test architecture leverages benchtop methods and algorithm level verification to decouple subsystem evaluations, increasing diagnostic power and minimizing variability from anatomy or imaging artifacts. This approach enhances traceability, enables earlier defect detection, and strengthens alignment between requirement intent and verification evidence. The resulting framework shows how disciplined requirements decomposition and focused test strategies can improve system assurance in orthopedic robotics while reducing development burden.","Affiliation":"Smith & Nephew","SessionLength":"30m","isMedtronic":false,"session_id":35,"uid":"s_35"},
    {"day":"Thursday 4/30","time":"9:30 AM","room":"Grand Foyer","type":"break","Title":"Break","SessionLength":"30m"},
    {"day":"Thursday 4/30","time":"10:00 AM","room":"Junior Ballroom","type":"session","Track":"AI/ML","Title":"The Systems Engineering Agentic Cookbook","Authors":"Justin Grammens","Abstract":"AI-assisted development has accelerated how software is built, but many teams are finding that speed without structure leads to fragile systems, unclear intent, and loss of architectural discipline. Ad hoc “vibe coding” may work for isolated tasks, but it breaks down when applied to systems that require traceability, verification, and long-term evolution. This session presents a practical, systems-first approach to AI-assisted engineering that integrates three complementary practices: specification-first development, product-minded engineering, and disciplined use of AI tools. During this session, attendees will see how a formalized framework, such as SpecKit, establishes clear system intent and constraints, enabling AI tools to operate within well-defined boundaries. The session demonstrates how product-minded engineering connects requirements to outcomes and how AI-assisted engineering accelerates implementation and iteration without compromising system rigor. Rather than replacing systems engineering practices, this approach reinforces them. AI becomes a force multiplier when embedded in structured workflows that preserve architectural integrity, support traceability, and align with the full system lifecycle. This talk is intended for systems engineers, technical managers, and architects seeking a repeatable model for integrating AI into modern systems engineering while maintaining control, clarity, and confidence in the systems they deliver.","Affiliation":"Lab651","SessionLength":"60m","isMedtronic":false,"session_id":50,"uid":"s_50"},
    {"day":"Thursday 4/30","time":"10:00 AM","room":"Salon A","type":"session","Track":"Cybersecurity","Title":"Cybersecurity Post-Market Analysis Monitoring System","Authors":"Gerald Rigdon","Abstract":"The Cybersecurity Post-Market Analysis Monitoring System (CPAMS) represents a composite approach to cybersecurity vulnerability monitoring and research, combining artificial intelligence and multi-source data integration to deliver threat intelligence. This paper presents a detailed analysis of the system's architecture, methodology, and capabilities, with particular emphasis on its application to medical device cybersecurity post-market surveillance. CPAMS integrates data from the National Vulnerability Database (NVD) and Tavily web-based search, generates an Azure index, and utilizes both Embedding Models and Large Language Models (LLMs) for vulnerability discovery and identification.","Affiliation":"Boston Scientific","SessionLength":"30m","isMedtronic":false,"session_id":21,"uid":"s_21"},
    {"day":"Thursday 4/30","time":"10:00 AM","room":"Salon B","type":"session","Track":"Beyond the System","Title":"SE Lite for Concept Stage","Authors":"John Vantuno and Jason Sherey","Abstract":"Systems Engineering is commonly avoided in the concept stage of product development because it is considered to be a burdensome activity that will slow down the innovation effort. As a result, the scope of work is ill-defined, leading to a “finished” product passed off to the development team to commercialize, even though it doesn't fulfil the real need of the stakeholders. The ideal situation would be to strike a balance between enough systems engineering to provide guidance, but not so much that the systems engineering work gets in the way. This presentation proposes a “Systems Engineering Lite” process that is the bare minimum necessary to fully define the problem space and design space, without slowing down the innovation effort. This process was successfully piloted on a small project. This presentation steps through how the process was applied, the benefits of its use, and the lessons learned regarding how it could have been applied better. It then lists the things to do and, just as importantly, the things not to do in the concept phase. It finishes with suggestions for scalability and relationships to the Agile process.","Affiliation":"Crossroads Chapter","SessionLength":"30m","isMedtronic":false,"session_id":29,"uid":"s_29"},
    {"day":"Thursday 4/30","time":"10:00 AM","room":"Salon D","type":"session","Track":"Other","Title":"Goodbye QSIT: A New Approach to FDA Inspections","Authors":"Paul Wisnewski","Abstract":"FDA has regulatory oversight of medical device companies operating in the United States, a part of which is the authority to conduct inspections. Since 1999, FDA has utilized a method referred to as Quality System Inspection Technique (QSIT) as a framework for most inspections. The QSIT technique focuses on four key process areas: Management Controls, Design Controls, CAPA, and Production and Process Controls. Effective 2-Feb-2026, the US regulation governing Quality Management Systems was revised, incorporating by reference ISO 13485, the international standard for medical device quality management systems. The change necessitated a rethinking of the historical QSIT method to align to the new regulation. To address this, FDA recently published revised inspection guidelines intended to focus on potential risks to patients and/or users. This presentation will provide an overview of the revised inspection approach, including the increased emphasis on product and process risk.","Affiliation":"Digital Diagnostics","SessionLength":"30m","isMedtronic":false,"session_id":13,"uid":"s_13"},
    {"day":"Thursday 4/30","time":"10:30 AM","room":"Salon A","type":"session","Track":"Cybersecurity","Title":"ASK AN EXPERT: Cybersecurity in Healthcare Systems","Authors":"Michelle Jump","Abstract":"Have lingering questions from the cybersecurity sessions? This open Q&A panel brings together our track speakers to address your questions and discuss real-world challenges in securing healthcare systems. The discussion will be driven by attendee questions, with a focus on practical insights and shared experience.","Affiliation":"MedSec","SessionLength":"60m","isMedtronic":false,"session_id":61,"uid":"s_61"},
    {"day":"Thursday 4/30","time":"10:30 AM","room":"Salon B","type":"session","Track":"Beyond the System","Title":"ROUNDTABLE: Medical Device Interoperability","Authors":"Joe Rayes","Abstract":"Medical Device Interoperability is very challenging. Reliable, high performing, safe, and secure interactions are difficult to ensure by design. This becomes more complex when many systems are involved and/or external systems are involved. Across the medical device industry there are various priorities, standards, and ecosystems at play. Just defining the boundaries and responsibilities within and between organizations is hard enough without the technical and compliance issues that will inevitably occur.\n\nDemonstrating compliance to the FDA Guidance for Interoperable Medical Devices, the ANSI/AAMI 2700, and the AAMI/ANSI/UL 2800 series is quite a challenge. This is especially true when considering the wide scope of clinical & technical topics covered like patient safety, efficacy, interfaces, architecture, data flow, cybersecurity, and human factors. Challenges also include the confusing and sometimes conflicting definitions of terms and the excruciating level of detail that seems to be required in some areas.\n\nMany of the interoperability problems we encounter in our companies are similar and the solutions we've found are often transferable to each other at some level of abstraction. The panelist & audience will share the top interoperability challenges and related solutions with each other. The goal of the session is to spread best interoperability practices and to continue building long-term cross-organizational networks on the topic.","Affiliation":"Eli Lilly and Company","SessionLength":"60m","isMedtronic":false,"session_id":55,"uid":"s_55"},
    {"day":"Thursday 4/30","time":"10:30 AM","room":"Salon C","type":"session","Track":"Healthcare Delivery","Title":"PANEL: From Silos to Systems - Engineering Integrated Care Delivery","Authors":"Sharon Hartzel","Abstract":"Healthcare systems face increasing pressure to make strategic decisions that cut across operations, workforce, facilities, technology, and finance, yet these decisions are often made using fragmented analyses, static plans, and siloed data. This presentation presents a real-world case study demonstrating how the Unified Architecture Framework can be applied as a model-based strategic planning approach for a large healthcare system.\n\nThe case study focuses on a leadership-level planning question (e.g., capacity, service-line growth, or workforce impact) and shows how UAF enables stakeholders to connect strategic objectives to operational activities, organizational roles, enabling systems, and resource constraints in a single, coherent model. Rather than emphasizing modeling formalisms, the presentation highlights how UAF supports scenario analysis, decision traceability, and cross-functional alignment—capabilities that are increasingly critical at the scale of healthcare systems.\n\nAttendees will see how system-level dependencies and risks that are typically hidden in spreadsheets or slide decks become visible through an integrated architecture view. The presentation will also discuss how this approach complements existing methods such as Lean Six Sigma, analytics, and simulation, rather than replacing them.\n\nThe session is intended for systems engineers, architects, and healthcare leaders interested in applying MBSE concepts beyond engineering domains.","SessionLength":"60m","isMedtronic":false,"session_id":65,"uid":"s_65"},

function getViewportMode() {
    const width = getEffectiveViewportWidth();
    const rawMode = width <= MOBILE_BREAKPOINT
        ? 'mobile'
        : (width <= COMPACT_BREAKPOINT ? 'compact' : 'desktop');

    if (!stableViewportMode) {
        stableViewportMode = rawMode;
        return stableViewportMode;
    }

    if (stableViewportMode === 'mobile') {
        // Stay mobile until width clearly exits the mobile threshold.
        if (width > (MOBILE_BREAKPOINT + VIEWPORT_MODE_HYSTERESIS)) {
            stableViewportMode = rawMode;
        }
        return stableViewportMode;
    }

    if (stableViewportMode === 'desktop') {
        // Stay desktop until width clearly re-enters compact/mobile range.
        if (width < (COMPACT_BREAKPOINT - VIEWPORT_MODE_HYSTERESIS)) {
            stableViewportMode = rawMode;
        }
        return stableViewportMode;
    }

    // compact mode: require clear crossing of either boundary before switching.
    if (width <= (MOBILE_BREAKPOINT - VIEWPORT_MODE_HYSTERESIS)) {
        stableViewportMode = 'mobile';
    } else if (width >= (COMPACT_BREAKPOINT + VIEWPORT_MODE_HYSTERESIS)) {
        stableViewportMode = 'desktop';
    }

    return stableViewportMode;
}

function getEffectiveViewportWidth() {
    const clientWidth = document.documentElement ? document.documentElement.clientWidth : 0;
    const innerWidth = window.innerWidth;
    return [clientWidth, innerWidth].find(w => Number.isFinite(w) && w > 0) || 0;

    const isMobileMode = getViewportMode() === 'mobile';

    if (stableTopbarCompact === null) {
        stableTopbarCompact = isMobileMode || width <= TOPBAR_COMPACT_ENTER_WIDTH;
    } else if (stableTopbarCompact) {
        if (!isMobileMode && width >= TOPBAR_COMPACT_EXIT_WIDTH) {
            stableTopbarCompact = false;

    } else if (isMobileMode || width <= TOPBAR_COMPACT_ENTER_WIDTH) {

function parseClockMinutes(timeString) {
    if (!timeString) return 0;
    const [timePart, meridiem] = timeString.split(' ');
    const [hourText, minuteText] = timePart.split(':');
    let hour = parseInt(hourText, 10);
    const minutes = parseInt(minuteText, 10);
    const isPm = meridiem === 'PM';
    if (isPm && hour !== 12) hour += 12;
    if (!isPm && hour === 12) hour = 0;
    return hour * 60 + minutes;
}

function formatClockMinutes(totalMinutes) {
    const m = ((Math.round(totalMinutes) % (24 * 60)) + 24 * 60) % (24 * 60);
    const h24 = Math.floor(m / 60);
    const min = m % 60;
    const meridiem = h24 >= 12 ? 'PM' : 'AM';
    let h12 = h24 % 12;
    if (h12 === 0) h12 = 12;
    const minStr = min < 10 ? `0${min}` : String(min);
    return formatTime(`${h12}:${minStr} ${meridiem}`);
}

function sortTimes(times) {
    return [...times].sort((left, right) => parseClockMinutes(left) - parseClockMinutes(right));
}

function parseDurationMinutes(lengthValue) {
    if (typeof lengthValue === 'number' && Number.isFinite(lengthValue)) {
        return lengthValue;
    }
    if (typeof lengthValue !== 'string') return null;
    const hoursMatch = lengthValue.match(/(\d+)\s*h/i);
    const minutesMatch = lengthValue.match(/(\d+)\s*m/i);
    const hours = hoursMatch ? parseInt(hoursMatch[1], 10) : 0;
    const minutes = minutesMatch ? parseInt(minutesMatch[1], 10) : 0;
    const total = (hours * 60) + minutes;
    return total || null;
}

function getDefaultDurationMinutes(dayTimes, session) {
    const sortedTimes = sortTimes(dayTimes);
    const startMinutes = parseClockMinutes(session.time);
    const nextTime = sortedTimes.find(time => parseClockMinutes(time) > startMinutes);
    if (!nextTime) return 30;
    return Math.max(SLOT_MINUTES, parseClockMinutes(nextTime) - startMinutes);
}

function getExplicitDurationMinutes(session) {

function getSlotMetrics(sessions) {
    if (sessions.length === 0) {
        return { dayStart: 0, totalSlots: 1 };
    }
    const dayTimes = sessions.map(s => s.time);
    const starts = sessions.map(s => parseClockMinutes(s.time));
    const ends = sessions.map(s => parseClockMinutes(s.time) + getSessionDurationMinutes(dayTimes, s));
    const dayStart = Math.min(...starts);
    const dayEnd = Math.max(...ends);
    return {
        dayStart,
        totalSlots: Math.max(1, Math.ceil((dayEnd - dayStart) / SLOT_MINUTES))
    };
}

function getGridPlacement(dayTimes, slotMetrics, session) {
    const startMinutes = parseClockMinutes(session.time);
    const durationMinutes = getSessionDurationMinutes(dayTimes, session);
    const startSlot = Math.floor((startMinutes - slotMetrics.dayStart) / SLOT_MINUTES) + 1;
    const slotSpan = Math.max(1, Math.ceil(durationMinutes / SLOT_MINUTES));
    return { startSlot, slotSpan, durationMinutes };
}

function getDayBounds(sessions) {
    if (sessions.length === 0) {
        return { start: 8 * 60, end: (8 * 60) + 60 };
    }

    const dayTimes = sessions.map(s => s.time);
    const starts = sessions.map(s => parseClockMinutes(s.time));
    const ends = sessions.map(s => parseClockMinutes(s.time) + getSessionDurationMinutes(dayTimes, s));

    const minStart = Math.min(...starts);
    const maxEnd = Math.max(...ends);
    const start = Math.floor(minStart / 30) * 30;
    const end = Math.ceil(maxEnd / 30) * 30;
    return { start, end };
}

function positionDetailsPanel(anchorEl) {
    const isMobile = isMobileLayoutViewport();
    const maxPanelHeight = isMobile
        ? Math.min(560, Math.floor(window.innerHeight * 0.76))
        : Math.min(640, Math.floor(window.innerHeight * 0.72));
    const contentHeight = Math.ceil(detailsPanel.scrollHeight || 0);
    const needsConstrainedHeight = contentHeight > maxPanelHeight;
    const panelHeight = needsConstrainedHeight ? maxPanelHeight : contentHeight;

    if (isMobile) {
        detailsPanel.style.height = needsConstrainedHeight ? `${panelHeight}px` : 'auto';
        detailsPanel.style.left = '12px';
        detailsPanel.style.right = '12px';
        detailsPanel.style.top = 'auto';
        detailsPanel.style.bottom = '12px';
        return;
    }

    const rect = anchorEl.getBoundingClientRect();
    const panelWidth = Math.min(360, window.innerWidth - 32);
    const gap = 12;

    detailsPanel.style.width = `${panelWidth}px`;
    detailsPanel.style.height = needsConstrainedHeight ? `${panelHeight}px` : 'auto';

    const spaceRight = window.innerWidth - rect.right - gap;
    const spaceLeft = rect.left - gap;
    const placeRight = (spaceRight >= panelWidth) || (spaceRight >= spaceLeft);
    const preferredLeft = placeRight ? (rect.right + gap) : (rect.left - panelWidth - gap);
    const left = Math.max(12, Math.min(preferredLeft, window.innerWidth - panelWidth - 12));

    const preferredTop = rect.top;
    const renderedHeight = needsConstrainedHeight ? panelHeight : Math.ceil(detailsPanel.getBoundingClientRect().height || panelHeight);
    const top = Math.max(12, Math.min(preferredTop, window.innerHeight - renderedHeight - 12));

    detailsPanel.style.left = `${left}px`;
    detailsPanel.style.right = 'auto';
    detailsPanel.style.top = `${top}px`;
    detailsPanel.style.bottom = 'auto';
}

}

    if (typeof qrcode !== 'function') {
        container.classList.add('qr-loading');
        container.textContent = 'QR library failed to load. Use Copy link instead.';
        return;
    }
    // Pick the smallest type-version that fits, with error correction L for capacity.
    let qr = null;
    for (let typeNumber = 4; typeNumber <= 40; typeNumber++) {
        try {
            const candidate = qrcode(typeNumber, 'L');
            candidate.addData(text);
            candidate.make();
            qr = candidate;
            break;
        } catch (e) { /* too small; try next */ }
    }
    if (!qr) {
        container.classList.add('qr-loading');
        container.textContent = 'Link too long for QR. Use Copy link.';
        return;
    }
    // Render as inline SVG for crisp scaling.
    const moduleCount = qr.getModuleCount();
    const cellSize = 4;
    const margin = 4;
    const size = moduleCount * cellSize + margin * 2;
    let path = '';
    for (let r = 0; r < moduleCount; r++) {
        for (let c = 0; c < moduleCount; c++) {
            if (qr.isDark(r, c)) {
                const x = margin + c * cellSize;
                const y = margin + r * cellSize;
                path += `M${x},${y}h${cellSize}v${cellSize}h-${cellSize}z`;
            }
        }
    }
    container.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${size} ${size}" preserveAspectRatio="xMidYMid meet"><rect width="${size}" height="${size}" fill="#fff"/><path d="${path}" fill="#111827"/></svg>`;
}
function shareStarredSchedule() {
    if (!starredSessions || starredSessions.length === 0) {
        showToast('No starred sessions to share');
        return;
    }
    const url = buildShareUrl(starredSessions);
    _currentShareUrl = url;
    const modal = document.getElementById('shareModal');
    const qrEl = document.getElementById('shareModalQr');
    const countEl = document.getElementById('shareModalCount');
    if (!modal || !qrEl) return;
    if (countEl) {
        const n = starredSessions.length;
        countEl.innerHTML = `Sharing <strong>${n}</strong> starred session${n === 1 ? '' : 's'}`;
    }
    renderQrInto(qrEl, url);
    modal.classList.add('show');
}
function handleStarsImportFromHash() {
    const hash = location.hash || '';
    const m = hash.match(/(?:^#|[#&])share=([^&]+)/);
    if (!m) return;
    const incoming = decodeStarsFromShare(m[1]);
    // Restrict to UIDs that actually exist in the data.
    const knownUids = new Set();
    Object.keys(data).forEach(day => (data[day] || []).forEach(s => { if (s.uid) knownUids.add(s.uid); }));
    const valid = incoming.filter(uid => knownUids.has(uid));
    // Clear the hash so it doesn't re-prompt on reload.
    history.replaceState(null, '', location.pathname + location.search);
    if (valid.length === 0) {
        showToast('Shared link had no matching sessions');
        return;
    }
    const current = new Set(starredSessions);
    const incomingSet = new Set(valid);
    const removed = [...current].filter(uid => !incomingSet.has(uid)).length;
    const added = valid.filter(uid => !current.has(uid)).length;

    let promptMsg;
    if (current.size === 0) {
        promptMsg = `Import ${valid.length} starred session${valid.length === 1 ? '' : 's'} from shared link?`;
    } else if (removed === 0 && added === 0) {
        promptMsg = `Your schedule already matches this shared schedule. Nothing to change.`;
        window.alert(promptMsg);
        return;
    } else {
        const parts = [];
        if (added) parts.push(`add ${added}`);
        if (removed) parts.push(`remove ${removed}`);
        promptMsg = `Replace your starred schedule with the shared one? This will ${parts.join(' and ')} session${(added + removed) === 1 ? '' : 's'}.`;
    }
    const accept = window.confirm(promptMsg);
    if (!accept) return;
    starredSessions = [...valid];
    localStorage.setItem('incose_2026_stars', JSON.stringify(starredSessions));
    showToast(`Imported ${valid.length} session${valid.length === 1 ? '' : 's'}`);
    // Switch to My Schedule view to show the imported result.
    const starTab = document.querySelector('.tab-btn.starred-tab');
    if (starTab) switchDay('starred', starTab);
    else renderSchedule();
}

function renderTrackFilters() {
    const container = document.getElementById('trackFilters');
    container.innerHTML = '';
    
    if (currentView === 'starred') {
        container.style.display = 'none';
        return;
    }

    container.style.display = '';

    const isSearchActive = ((document.getElementById('searchBar')?.value || '').trim() !== '');

    const tracks = isSearchActive
        ? Object.values(data).flat().map(s => s.Track).filter(Boolean)
        : getAllTracksForDay(currentView);
    
    const uniqueTracks = [...new Set(tracks)]
        .filter(track => String(track).trim().toLowerCase() !== 'general')
        .sort();
    if (uniqueTracks.length === 0) {
        container.style.display = 'none';
        return;
    }

    const label = document.createElement('span');
    label.className = 'filter-label';
    label.textContent = 'Filter:';
    container.appendChild(label);

    // Medtronic chip — always shown first
    const medChip = document.createElement('button');
    const medActive = activeTrackFilters.has('__medtronic__');
    medChip.className = 'track-chip' + (activeTrackFilters.size === 0 || medActive ? ' active' : ' inactive');
    medChip.style.borderColor = '#007bff';
    if (medActive) medChip.style.background = '#007bff22';
    const medDot = document.createElement('span');
    medDot.className = 'chip-dot';
    medDot.style.background = '#007bff';
    medChip.appendChild(medDot);
    medChip.appendChild(document.createTextNode('Medtronic'));
    medChip.onclick = () => toggleTrackFilter('__medtronic__');
    container.appendChild(medChip);

    uniqueTracks.forEach(track => {
        const chip = document.createElement('button');
        chip.className = 'track-chip' + (activeTrackFilters.size === 0 || activeTrackFilters.has(track) ? ' active' : ' inactive');
        chip.style.borderColor = getTrackColor(track);
        if (activeTrackFilters.has(track)) chip.style.background = getTrackColor(track) + '22';
        
        const dot = document.createElement('span');
        dot.className = 'chip-dot';
        dot.style.background = getTrackColor(track);
        chip.appendChild(dot);
        chip.appendChild(document.createTextNode(track));
        
        chip.onclick = () => toggleTrackFilter(track);
        container.appendChild(chip);
    });

    if (activeTrackFilters.size > 0) {
        const clearBtn = document.createElement('button');
        clearBtn.className = 'track-chip';
        clearBtn.textContent = 'Clear';
        clearBtn.style.borderColor = '#ccc';
        clearBtn.onclick = () => { activeTrackFilters.clear(); renderTrackFilters(); applyFilters(); };
        container.appendChild(clearBtn);
    }

function toggleTrackFilter(track) {
    if (activeTrackFilters.has(track)) {
        activeTrackFilters.delete(track);
    } else {
        activeTrackFilters.add(track);
    }
    renderTrackFilters();
    applyFilters();
}

function renderSchedule() {
    searchQuery = (document.getElementById('searchBar')?.value || '').toLowerCase().trim();
    isGlobalSearchMode = currentView !== 'starred' && searchQuery !== '';

    // Keep talk-track chips aligned with current mode (day-only vs all-days search).
    renderTrackFilters();

    const container = document.getElementById('scheduleContainer');
