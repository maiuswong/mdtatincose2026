        .tab-btn.starred-tab.active { background: var(--star-color); color: white; }

        .time-col { width: 75px; flex-shrink: 0; text-align: right; font-weight: 700; font-size: 11px; color: var(--text-secondary); padding-top: 10px; }
        .sessions-grid { flex: 1; display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 10px; align-items: stretch; }

            border-radius: 8px; 
            padding: 14px 16px 14px 16px; 
            border: 2px solid var(--border); /* Made 2px to match Medtronic thickness */

            position: relative; 
            display: flex; 
            flex-direction: column; 
            height: 100%;

        }
        .session-card.medtronic-highlight { border: 2px solid var(--medtronic-blue); box-shadow: 0 0 6px rgba(0, 75, 135, 0.15); }
        .indicator-bar { position: absolute; left: 0; top: 14px; bottom: 14px; width: 4px; border-radius: 0 4px 4px 0; }
        
        .card-header { 
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 8px; 
            min-height: 20px;
        }
        
        .room-badge { font-size: 11px; font-weight: 600; color: var(--text-secondary); text-transform: none; }
        
        .header-actions { 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            justify-content: flex-end; 
            width: 160px;
            flex-shrink: 0;
        }

        .track-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

        .star-btn.active { color: var(--star-color); }
        
        .session-title { font-weight: 700; font-size: 14px; line-height: 1.4; margin: 0 0 8px 0; text-transform: none; }

        .session-authors { font-size: 11px; color: var(--text-secondary); flex: 1; padding-right: 10px; text-transform: none; }
        .duration-tag { font-size: 10px; font-weight: 600; background: #f1f3f4; padding: 2px 6px; border-radius: 4px; color: #5f6368; flex-shrink: 0; text-transform: none; }
        
        .abstract { display: none; margin-top: 10px; font-size: 12px; line-height: 1.5; border-top: 1px solid #eee; padding-top: 10px; text-transform: none; }
        .abstract.show { display: block; }
        .break-card { grid-column: 1 / -1; background: #f1f3f4; border: 2px dashed var(--border); padding: 10px; text-align: center; font-size: 12px; border-radius: 8px; font-weight: 500; text-transform: none; }
        
        @media (max-width: 768px) { 
            .time-row { flex-direction: column; gap: 6px; } 
            .time-col { text-align: left; width: 100%; border-bottom: 2px solid #eee; padding-bottom: 4px; margin-bottom: 4px; } 
            .sessions-grid { grid-template-columns: 1fr; } 
        }
    </style>

      "Abstract": "Physiologic closed-loop controlled (PCLC) devices represent a complex system of integrated medical devices that can automate aspects of patient care. Non-clinical computational modeling and/or hardware-in-the-loop (HIL) testing of PCLC devices can accelerate medical device development. \n\nWe present and characterize a novel HIL testbed for PCLC fluid resuscitation systems. An example PCLC fluid system includes a patient monitor, control algorithm that adjusts infusion rate based on pressure measurements, infusion pump, and data communication. The HIL testbed simulates virtual patients using a mathematical model of the cardiovascular system that outputs pulse rate (PR) and mean arterial pressure (MAP) for blood pressure waveform generation with a pressure pulse generator to which a pressure sensor and patient monitor can be connected. A scale is used to measure infusion rate (IR) as an input to the model. Relevant disturbances and physiologic variability are incorporated.\n\nTo characterize the testbed, a command trajectory of steps and ramps spanned the range of IR, PR, and MAP. Differences between each command and its measured value determined errors, reported as root mean squared (RMS) and 95% confidence intervals (CI). Step IR had RMSE <5 mL/min (CI width ≤2 mL/min). The steepest ramp IR had the worst error (RMSE <10 and CI width <15 mL/min). PR errors were dominated by quantization (RMSE 4.3, CI: -3.8, 5.6 bpm). MAP had RMSE of 1.7 mmHg (CI: -1.2, 1.8 mmHg).",

      "Authors": "Pourash Patel",
      "Abstract": "The reliability of alarm systems in life supporting medical devices is fundamental to patient safety. Standards such as IEC 60601 1 12 require that high priority alarms, such as ventilator high pressure or infusion pump occlusion alarms, be verified to operate correctly under single fault conditions. Conventional safety analyses, including Failure Mode and Effects Analysis (FMEA) and Hazard Analysis, rely on manual logical reasoning that can introduce inconsistencies and undermine safety assurance. \n\nThis work presents a Model Based Systems Engineering (MBSE) workflow that formally validates the Method of Control for each identified failure mode through model integrated fault injection. The approach executes each fault scenario derived from the fault tree across a range of device configurations, patient categories, and clinically relevant complications. Simulation outcomes provide objective, repeatable evidence of intended alarm behavior. \n\nResults demonstrate that integrating MBSE with fault injection analysis reduces logical error rates and enhances the completeness and traceability of safety verification activities. Applying this methodology early in the development cycle enables earlier detection of design deficiencies and supports a more robust safety case for medical device.",

      "Authors": "Sri Harsha Maramraju",
      "Abstract": "Developing reusable medical device platforms presents a systemic challenge: generating compliant, reusable V&V evidence for diverse product lines. This presentation details a formal Product Line Engineering (PLE) framework that treats a reusable subsystem as an internal product, enabling accelerated time-to-market for distinct applications.\n\nThe session provides a practical roadmap for transforming needs into a robust library of reusable evidence, illustrated with cross-industry examples. Key takeaways for practitioners include:\n\nA Dual-Input Model: Partitioning design inputs into Market-Facing Needs (e.g., performance, usability) and internal Operational Requirements (e.g., COGS, yield). The \"Analysis Record\" as a Justification Bridge: Using a formal analysis report to systematically decompose system-level needs (e.g., ±5% dose accuracy) into verifiable technical requirements. A \"Linked-Pair\" Traceability Strategy: Formally linking a Product Need (\"deliver X\") to a Platform Need (\"enable X\") to ensure clear accountability and facilitate evidence reuse. The Reusable \"Chassis\" Concept: Expanding the platform boundary to include a validated structural packaging chassis, allowing product teams to bypass redundant physical V&V for new SKUs. This presentation provides a field-tested Systems Engineering framework for building a scalable and compliant PLE strategy, offering a high-leverage approach for any organization developing complex medical systems.",

      "Abstract": "As gastroenterology practices strive for enhanced clinical precision, streamlined workflows, and improved patient-provider relationships, the integration of artificial intelligence (AI) offers a transformative solution. This submission explores how AI is revolutionizing the field by focusing on two core applications: advanced procedural assistance and intelligent documentation. We will highlight the GI Genius™ module, an AI-powered system that provides real-time visual assistance during colonoscopies. This technology has demonstrated a significant increase in the adenoma detection rate (ADR) by up to 14.4%, a crucial metric for reducing the risk of colorectal cancer. We will discuss the role of ambient AI, in streamlining administrative burdens. By seamlessly capturing and structuring patient-provider conversations, these systems save clinicians 1–2 hours daily on documentation tasks and help combat professional burnout. This technological EMR/PM integration not only enhances the quality of clinical notes but also improves the patient experience by allowing clinicians to focus fully on the individual rather than the screen. The presentation will demonstrate how the strategic implementation of these AI solutions drives tangible improvements in efficiency, clinical outcomes, and provider retention, creating a more sustainable and patient-centric healthcare environment.",

      "Authors": "Maius Wong, Joseph Green and Joshua Zehoski",
      "Abstract": "Model-Based Systems Engineering (MBSE) modeling captures a comprehensive system architecture and design with associated requirements management for complex medical device systems, but the resulting testing volume can pose significant challenges for traditional manual verification activities. The MBSE model's use of variation points, nested architectures, and other modeling techniques can exponentially increase the potential number of test cases. \n\nTo address this, a scalable automation framework utilizing a “LEGO block” strategy was developed, in which automated analysis and reuse of the MBSE model elements allow for dynamic assembly into detailed test protocols, ensuring systematic coverage of diverse device configurations and workflows.\n\nAdditionally, the framework automates the execution of test protocols through cross-platform scripting and test automation tools, ensuring consistent and repeatable verification. Practical application of this approach resulted in a 60% reduction in test execution time while maintaining comprehensive coverage of system variations. By combining MBSE-driven requirements management with modular automation for both protocol generation and execution, this framework significantly enhances the efficiency, reliability, and scalability of verification processes in medical system development.",

      "Abstract": "SysML V2 is a new language to implement Model Based Systems Engineering (MBSE).  SysML v1.0 was introduced in 2007 and iterated up to the latest release of v1.7 in 2024. Throughout the constant development of the language, gaps were identified and limitations existed which did not align with the rapidly evolving Digital Engineering ecosystems across many industries.\n\nAttendees will be introduced to the fundamentals implemented in SysML v1 and the changes which are essential to SysML v2.  This presentation will discuss the broadening of the language into textual plus graphical notations and how this will impact systems design of the future.  After that, we will discuss the latest released specification and the implications of not only a standardized language, but also standard transformation from v1 to v2 and a standard API for enhanced tool integrations.  Lastly, a brief demo will show the interface of CATIA Magic to demonstrate how both textual and graphical modeling are necessary when building in SysML v2.",

      "Authors": "Sri Harsha Maramraju",
      "Abstract": "As medical device manufacturers adopt Artificial Intelligence, confusion may emerge regarding the distinct roles of Generative AI (GenAI) and Process Automation. In the context of FDA Design Controls, misapplying these technologies creates compliance challenges. Using a Large Language Model to \"guess\" traceability links introduces probabilistic errors, whereas relying on rigid automation for requirements remediation misses the semantic capabilities of modern tools.\n\nThis presentation provides a strategic framework for Systems Engineering leaders to categorize modernization efforts. It distinguishes between \"Probabilistic\" tasks suitable for GenAI—focusing on semantic analysis and content classification—versus \"Deterministic\" tasks requiring automation to ensure the structural integrity and traceability of the Design History File (DHF).\n\nReal-world scenarios involving complex standard hierarchies, such as the IEC 60601 family, illustrate how a hybrid approach functions. The session offers a decision matrix for tool selection, helping teams architect a digital ecosystem that leverages the creativity of GenAI for classification and authoring while enforcing the integrity of Automation for the audit trail. This approach balances innovation with the rigor required for regulatory submissions, ensuring that efficiency does not compromise the objective evidence needed for clearance.",

      "Authors": "Joseph Rayes",
      "Abstract": "Same test. Different molecule. Repeat. If your combination product development feels like Groundhog Day—proving the same device performance, reliving the same review meetings, having leverage conversations that never stick—you're not alone. \n\nAs portfolios scale, the program-by-program approach becomes a trap: redundant work, inconsistent rationale, and no coherent baseline. The challenge isn't efficiency; it's the absence of a systematic way to determine what can be leveraged versus what requires novel development. Without deliberate architecture, February 3rd never comes.\n\nThis session addresses both dimensions. Technically, the presenter shares early experiences building platform asset libraries spanning design inputs and outputs, establishing design spaces that allow programs to configure rather than recreate. Central is a decision framework: a structured method for answering \"can we leverage this?\" with explicit criteria rather than case-by-case judgment.\n\nOrganizationally, the session confronts the harder truth: technical architecture is the easy part. The real work is changing mental models, governance processes, and organizational habits—combating resistance, gaining alignment in committee-driven environments, and evolving governance to focus on what's truly different.\n\nThis work is maturing, and the session invites dialogue. Attendees will leave with questions to challenge their own Groundhog Day and a vision for February 3rd.",

      "Title": "From Spreadsheets to Systems Models: Evaluating MBSE for Process Parameter Criticality Assessment in Allogeneic CAR-T Cell Therapy Development",
      "Authors": "Kristina Carroll",
      "Abstract": "ICH Q8(R2) defines a critical process parameter (CPP) as one whose variability impacts a critical quality attribute (CQA) and should be controlled to ensure product quality. ICH Q11 requires that criticality assessments be supported by risk assessments and experimental investigation. For allogeneic CAR-T cell therapies, each process parameter must be evaluated against multiple CQAs, assigned an impact rating, and linked to specific experimental results justifying that classification. \n\nCurrent industry practice relies on spreadsheet-based tools, creating significant vulnerabilities: fragile traceability between ratings and experimental data, poor version control, and rationale disconnected from assessments—making regulatory submissions difficult to defend.\n\nThis presentation evaluates applying Model-Based Systems Engineering using SysML to process parameter impact assessment. We examine whether MBSE tools can represent process parameters, CQAs, impact ratings, and linkages to experimental evidence while maintaining ICH-required traceability. The evaluation identifies where native SysML functionality suffices and where methodology development, profile extensions, or custom tooling may be necessary. Practical guidance will be provided for organizations seeking improved documentation rigor consistent with ICH Q8, Q9, and Q11.",

      "Authors": "David Cronin, Joseph Rayes, John Weiner and Thomas Bradley",
      "Abstract": "Currently available clinical models of care for behavioral health have been developed at a very high level of abstraction, using the evidence base for individual diagnoses, with varying degrees of success in translating these models into routine practice. In reality, individuals present to the healthcare system with co-occurring diagnoses. An additive approach to individual evidence-bases becomes too complex and unwieldy to implement, especially when these clinical models lack detailed level descriptions. Integrating and translating such a model across multiple evidence bases is the challenge and innovation of this work. Much of the literature using systems engineering in healthcare delivery has mainly focused on mathematical analytical methods (e.g., discrete-event modeling) to evaluate and optimize patient flow through the system. Engineering design methodologies and tools are used innovatively to accelerate progress in conceptualizing and developing integrated, translatable clinical models. They are used for both the design (synthesis) and the evaluation (analysis) of the system model. Specifically, engineering design methodology and system architecture provide rigorous design methods for developing the clinical model, while Model-Based Systems Engineering tools enable the development of a visual, multi-level, multi-detail clinical model. ",

    let starredSessions = JSON.parse(localStorage.getItem('incose_2026_stars')) || [];
    let currentView = Object.keys(data)[0];

    function init() {
        const tabsContainer = document.getElementById('dayTabs');
        Object.keys(data).forEach((day, index) => {
            const btn = document.createElement('button');
            btn.className = 'tab-btn' + (index === 0 ? ' active' : '');
            btn.innerText = day;
            btn.onclick = () => switchDay(day, btn);
            tabsContainer.appendChild(btn);
        });
        const starTab = document.createElement('button');
        starTab.className = 'tab-btn starred-tab';
        starTab.innerHTML = '⭐ My Schedule';
        starTab.onclick = () => switchDay('starred', starTab);
        tabsContainer.appendChild(starTab);
        renderSchedule();
    }

    function toggleStar(uid, starEl, event) {
        event.stopPropagation();
        const index = starredSessions.indexOf(uid);
        if (index > -1) { starredSessions.splice(index, 1); starEl.classList.remove('active'); starEl.innerHTML = '☆'; }
        else { starredSessions.push(uid); starEl.classList.add('active'); starEl.innerHTML = '★'; }
        localStorage.setItem('incose_2026_stars', JSON.stringify(starredSessions));
        if (currentView === 'starred') renderSchedule();
    }

    function renderSchedule() {
        const container = document.getElementById('scheduleContainer');
        container.innerHTML = '';
        let daysToRender = currentView === 'starred' ? Object.keys(data) : [currentView];
        daysToRender.forEach(day => {
            const timeGroups = {};
            data[day].forEach(item => {
                if (currentView === 'starred' && item.type !== 'break' && !starredSessions.includes(item.uid)) return;
                if (!timeGroups[item.time]) timeGroups[item.time] = [];
                timeGroups[item.time].push(item);
            });
            const daySection = document.createElement('div');
            daySection.className = 'day-section active';
            if (currentView === 'starred') {
                const dayHeader = document.createElement('h3');
                dayHeader.innerText = day;
                let dayHasSessions = true;
                if (dayHasSessions) daySection.appendChild(dayHeader); 
            }
            Object.keys(timeGroups).forEach(time => {
                if (currentView === 'starred' && !timeGroups[time].some(s => s.type !== 'break')) return;
                const row = document.createElement('div');
                row.className = 'time-row';
                const tCol = document.createElement('div');
                tCol.className = 'time-col'; tCol.innerText = time;
                row.appendChild(tCol);
                const grid = document.createElement('div');
                grid.className = 'sessions-grid';
                timeGroups[time].forEach(session => grid.appendChild(createCard(session)));
                row.appendChild(grid);
                daySection.appendChild(row);
            });
            container.appendChild(daySection);
        });
        filterSessions();
    }

    function createCard(s) {

        const isMedtronic = s.isMedtronic;
        const isStarred = starredSessions.includes(s.uid);
        const card = document.createElement('div');
        card.className = 'session-card' + (isMedtronic ? ' medtronic-highlight' : '');
        card.onclick = () => { const abs = card.querySelector('.abstract'); if (abs) abs.classList.toggle('show'); };
        let tColor = 'var(--neutral)';
        let trackName = s.Track || '';
        if (trackName) { for (let k in trackColors) { if (trackName.toLowerCase().includes(k.toLowerCase())) { tColor = trackColors[k]; break; } } }
        card.innerHTML = `
            <div class="indicator-bar" style="background:${tColor}"></div>
            <div class="card-header">
                <span class="room-badge">${s.room}</span>
                <div class="header-actions">
                    ${trackName ? `<div class="track-info"><span>${trackName}</span><div class="track-dot" style="background:${tColor}"></div></div>` : ''}
                    <span class="star-btn ${isStarred ? 'active' : ''}" onclick="toggleStar('${s.uid}', this, event)">${isStarred ? '★' : '☆'}</span>
                </div>
            </div>
            <h4 class="session-title">${s.Title}</h4>
            <div class="session-meta-bottom">
                <div class="session-authors">${s.Authors && s.Authors !== 'nan' ? s.Authors : ''}</div>
                ${s.SessionLength && s.SessionLength !== 'nan' ? `<span class="duration-tag">⏱ ${s.SessionLength}</span>` : ''}
            </div>
            ${s.Abstract ? `<div class="abstract">${s.Abstract}</div>` : ''}
        `;
        return card;
    }

    function switchDay(viewId, btn) { currentView = viewId; document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); renderSchedule(); }
    function filterSessions() {
        const query = document.getElementById('searchBar').value.toLowerCase();
        document.querySelectorAll('.session-card').forEach(card => card.style.display = card.innerText.toLowerCase().includes(query) ? 'flex' : 'none');
        document.querySelectorAll('.time-row').forEach(row => {
            const visible = row.querySelectorAll('.session-card[style="display: flex;"], .break-card').length > 0;
            row.style.display = (visible || query === '') ? 'flex' : 'none';
        });
    }
    init();
</script>
</body>
</html>
